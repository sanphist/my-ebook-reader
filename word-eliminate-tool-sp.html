<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CocaCrush口渴单词消消乐</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    html, body {
      overflow: auto;
      touch-action: pan-x pan-y;
      -webkit-overflow-scrolling: touch;
    }
    body { margin: 0; font-family: "微软雅黑", sans-serif; background: #eafae4; color: #213421; }
    .page { padding: 10px 12px 16px; }
    h2 { margin: 0 0 6px; color: #388e3c; font-size: 24px; line-height: 1.2; }
    #fileNotice { color: #d35c16; font-size: 13px; margin-left: 6px; }
    #sheetWrap {
      display: none;
      margin-top: 6px;
      padding: 6px 8px;
      background: #f3fcea;
      border: 1px solid #cbe6c4;
      border-radius: 10px;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    #sheetWrap label, #sheetHint { color: #276027; font-size: 13px; }
    #sheetHint { opacity: 0.86; }
    #sheetSelect, #sortSelect, #searchBox, .header-filter-text, .header-filter-select {
      border: 1px solid #b4e2b5;
      border-radius: 6px;
      background: #fff;
      color: #224422;
    }
    #sheetSelect, #sortSelect { font-size: 13px; padding: 4px 8px; }
    #searchBox { font-size: 13px; padding: 4px 7px; width: 150px; }
    #progressPanel {
      display: none;
      margin-top: 6px;
      padding: 7px 10px;
      background: #fff8dc;
      border: 1px solid #ecd587;
      border-radius: 10px;
      color: #7b5a00;
      box-shadow: 0 2px 8px rgba(236, 213, 135, 0.25);
    }
    #progressText { font-size: 13px; font-weight: 600; }
    #progressSubText { font-size: 12px; opacity: 0.88; margin-top: 3px; }
    #progressBar {
      margin-top: 8px;
      height: 6px;
      border-radius: 999px;
      background: rgba(236, 213, 135, 0.45);
      overflow: hidden;
    }
    #progressBar::after {
      content: "";
      display: block;
      width: 38%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f6d365, #fda085);
      animation: progress-slide 1.1s linear infinite;
    }
    #btnBar { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 6px; align-items: center; }
    #btnBar button, #topBtns button, #resetBtn {
      background: #49b266;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    #btnBar button:hover, #topBtns button:hover, #resetBtn:hover { background: #6fd590; }
    #clearHeaderFiltersBtn { background: #7ab76f; }
    #resetBtn { background: #b7c96c; color: #3a400e; margin-top: 8px; }
    #resetBtn:hover { background: #d4e38b; }
    #statBar { font-size: 13px; margin: 6px 0 4px; color: #276027; line-height: 1.35; }
    .pagination { margin: 6px 0; }
    .pagination button {
      margin: 0 2px;
      background: #b4e2b5;
      border: none;
      border-radius: 4px;
      color: #2e592b;
      font-weight: bold;
      padding: 3px 8px;
      cursor: pointer;
    }
    .pagination button:hover { background: #e2fbe4; }
    .pagination b { color: #1c5c1c; font-size: 15px; padding: 0 3px; }
    #topBtns { display: none; margin-bottom: 6px; }
    .table-wrap {
      overflow: auto;
      background: #f6fef2;
      border-radius: 12px;
      box-shadow: 0 2px 8px 0 #b7e2b2;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: auto;
      touch-action: pan-x pan-y;
    }
    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      background: #f6fef2;
    }
    th, td {
      border: 1px solid #cbe6c4;
      padding: 6px;
      text-align: left;
      font-size: 17px;
      vertical-align: top;
      box-sizing: border-box;
    }
    thead th {
      background: #d8f5cf;
      color: #1d6526;
      position: sticky;
      z-index: 3;
      overflow: visible;
    }
    thead tr.header-row th { top: 0; height: 56px; }
    thead tr.filter-row th { top: 56px; z-index: 2; padding: 4px; background: #eefbe8; height: 106px; }
    .th-inner { display: flex; align-items: center; justify-content: space-between; gap: 4px; min-width: 82px; padding-right: 12px; width: 100%; }
    .th-label {
      font-weight: 700;
      line-height: 1.05;
      word-break: keep-all;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 15px;
    }
    .th-flag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      border-radius: 11px;
      padding: 0 4px;
      font-size: 10px;
      background: #a6dc9f;
      color: #1d6526;
    }
    .th-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .sort-btn, .small-btn {
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #c3ebbc;
      color: #215d25;
      font-size: 12px;
      min-width: 22px;
      height: 22px;
      padding: 0 5px;
    }
    .sort-btn:hover, .small-btn:hover { background: #b3e4ac; }
    .sort-btn.active { background: #49b266; color: #fff; }
    .header-filter-box {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 82px;
      min-height: 92px;
      justify-content: flex-start;
    }
    .header-filter-text, .header-filter-select {
      width: 100%;
      font-size: 12px;
      padding: 3px 5px;
      box-sizing: border-box;
      min-height: 32px;
      height: 32px;
      line-height: 1.1;
    }
    .filter-status {
      font-size: 10px;
      color: #457341;
      line-height: 1.2;
      min-height: 16px;
      height: 16px;
      display: flex;
      align-items: center;
    }
    #columnPopover {
      display: none;
      position: fixed;
      top: 56px;
      right: 10px;
      z-index: 40;
      width: min(360px, calc(100vw - 20px));
      max-height: min(72vh, 680px);
      overflow: auto;
      padding: 8px;
      background: rgba(243, 252, 234, 0.98);
      border: 1px solid #cbe6c4;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(84, 130, 76, 0.16);
      backdrop-filter: blur(4px);
    }
    #columnToolBar, #columnPanel {
      display: none;
      margin: 0;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 0;
    }
    #columnToolBar {
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding-bottom: 6px;
      margin-bottom: 6px;
      border-bottom: 1px solid #d6e8ce;
    }
    #selectedColumnLabel {
      color: #1d6526;
      font-size: 13px;
      font-weight: 600;
      margin-right: 2px;
    }
    .tool-btn {
      background: #7ab76f;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .tool-btn:hover { background: #63a657; }
    #columnPanel { color: #27502c; }
    #columnPanelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    #columnPanelTitle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
    }
    #columnPanelActions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .icon-btn {
      border: none;
      border-radius: 6px;
      background: #d8edd1;
      color: #27502c;
      font-size: 14px;
      line-height: 1;
      width: 24px;
      height: 24px;
      cursor: pointer;
      padding: 0;
    }
    .icon-btn:hover { background: #c2dfb8; }
    #columnCheckboxList {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 6px 8px;
    }
    .column-check {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 6px;
      background: #fff;
      border: 1px solid #d8edd1;
      border-radius: 8px;
      min-height: 28px;
      box-sizing: border-box;
    }
    .column-check input { width: 15px; height: 15px; }
    .column-check.filtered { border-color: #7ab76f; background: #f9fff4; }
    .resizable-th, .resizable-filter-th { position: sticky; }
    .resizable-th.selected, .resizable-filter-th.selected { background: #cdecc0; }
    .resizable-th.touch-resize-active, .resizable-filter-th.touch-resize-active {
      background: #bfe7b2;
      box-shadow: inset 0 0 0 2px rgba(73, 178, 102, 0.28);
    }
    .col-resizer {
      position: absolute;
      top: 0;
      right: -5px;
      width: 10px;
      height: 100%;
      cursor: col-resize;
      z-index: 6;
      user-select: none;
      touch-action: none;
    }
    .col-resizer::after {
      content: "";
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 4px;
      width: 2px;
      border-radius: 2px;
      background: transparent;
      transition: background 0.15s ease;
    }
    .col-resizer:hover::after,
    .resizable-th.resizing .col-resizer::after { background: #49b266; }
    .sticky-col {
      position: sticky;
      z-index: 2;
      background: #f6fef2;
    }
    .sticky-col.header-cell {
      z-index: 7;
      background: #d8f5cf;
    }
    .sticky-col.filter-cell {
      z-index: 6;
      background: #eefbe8;
    }
    .sticky-divider {
      box-shadow: 2px 0 0 rgba(73, 178, 102, 0.18);
    }
    .study-col-1 {
      box-shadow: inset 0 0 0 9999px rgba(255, 248, 196, 0.52);
      border-left: 3px solid rgba(255, 193, 7, 0.38);
    }
    .study-col-2 {
      box-shadow: inset 0 0 0 9999px rgba(230, 247, 255, 0.62);
      border-left: 3px solid rgba(59, 130, 246, 0.28);
    }
    .first-col-emphasis {
      font-size: 21px !important;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .first-col-filter {
      font-size: 14px !important;
    }
    .second-col-emphasis {
      font-size: 18px !important;
      font-weight: 700;
      letter-spacing: 0.12px;
    }
    .second-col-filter {
      font-size: 13px !important;
    }
    .first-col-huge {
      font-size: 25px !important;
      font-weight: 900;
      line-height: 1.18;
    }
    .first-col-filter-huge .header-filter-text,
    .first-col-filter-huge .header-filter-select {
      font-size: 15px !important;
    }
    .first-col-filter-huge .filter-status {
      font-size: 12px !important;
    }
    .second-col-huge {
      font-size: 21px !important;
      font-weight: 800;
      line-height: 1.18;
    }
    .second-col-filter-huge .header-filter-text,
    .second-col-filter-huge .header-filter-select {
      font-size: 14px !important;
    }
    tr.eliminated { background: #ffb46a !important; color: #502800 !important; text-decoration: line-through; font-weight: bold; }
    tr.eliminated button { background: #fff !important; color: #d60000 !important; font-size: 28px; font-weight: bold; }
    tr.eliminated td { border-color: #db9900 !important; }
    .action-header-cell {
      text-align: center;
      vertical-align: middle;
    }
    .action-cell {
      width: 52px;
      min-width: 52px;
      padding: 0 !important;
      text-align: center;
      vertical-align: middle;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .action-cell:hover {
      background: rgba(229, 57, 53, 0.08);
    }
    .action-cell:active {
      background: rgba(229, 57, 53, 0.14);
    }
    .action-cell .eliminate-btn {
      pointer-events: none;
      margin: 0 auto;
    }
    .eliminate-btn {
      background: #e53935;
      color: #fff;
      font-size: 30px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 2px 8px rgba(229, 57, 53, 0.28);
    }
    .eliminate-btn:hover { background: #cc2f2f; }
    .empty-row { text-align: center; color: #618760; font-size: 17px; padding: 22px 10px; }
    #pageSliderWrap { position: fixed; right: 6px; top: 120px; z-index: 5; width: 36px; height: 66vh; display: none; }
    #pageSlider { position: relative; width: 100%; height: 100%; background: #d4f5c4; border-radius: 26px; }
    .slider-thumb {
      position: absolute;
      left: 0;
      width: 100%;
      height: 36px;
      line-height: 36px;
      text-align: center;
      font-size: 20px;
      color: #157020;
      background: #77dd77;
      border-radius: 18px;
      box-shadow: 0 2px 8px #b7e2b2;
      font-weight: bold;
      user-select: none;
    }
    
    .compact-fz-th .th-inner {
      min-width: 18px !important;
      padding-right: 2px !important;
      gap: 1px !important;
    }
    .compact-fz-th .th-label {
      font-size: 8px !important;
      line-height: 1 !important;
      word-break: break-all !important;
    }
    .compact-fz-th .th-flag {
      min-width: 8px !important;
      height: 8px !important;
      font-size: 6px !important;
      padding: 0 1px !important;
    }
    .compact-fz-filter .header-filter-box {
      min-width: 18px !important;
      gap: 1px !important;
    }
    .compact-fz-filter .header-filter-text,
    .compact-fz-filter .header-filter-select {
      width: 100% !important;
      font-size: 6px !important;
      height: 14px !important;
      min-height: 14px !important;
      padding: 0 1px !important;
      line-height: 1 !important;
    }
    .compact-fz-filter .filter-status {
      font-size: 6px !important;
      min-height: 8px !important;
      line-height: 1 !important;
    }


    .compact-fz-td {
      font-size: 8px !important;
      line-height: 1 !important;
      padding: 2px 0 !important;
      letter-spacing: -0.2px !important;
      text-align: center !important;
      word-break: break-all !important;
      white-space: normal !important;
      overflow-wrap: anywhere !important;
    }



    .col2-fixed-th .th-inner {
      min-width: 30px !important;
      padding-right: 4px !important;
      gap: 2px !important;
    }
    .col2-fixed-filter .header-filter-box {
      min-width: 30px !important;
      min-height: 92px !important;
      height: 92px !important;
      gap: 4px !important;
      justify-content: flex-start !important;
    }
    .col2-fixed-filter .header-filter-text,
    .col2-fixed-filter .header-filter-select {
      width: 100% !important;
      min-height: 32px !important;
      height: 32px !important;
      padding: 2px 3px !important;
      line-height: 1.1 !important;
      font-size: 11px !important;
    }
    .col2-fixed-filter .filter-status {
      min-height: 16px !important;
      height: 16px !important;
      line-height: 1 !important;
      font-size: 9px !important;
    }


    .fk-text-big {
      font-size: 21px !important;
      font-weight: 800 !important;
      line-height: 1.18 !important;
    }
    .fk-header-big .th-label {
      font-size: 21px !important;
      font-weight: 800 !important;
      line-height: 1.18 !important;
    }
    .fk-header-big .th-flag {
      font-weight: 800 !important;
    }
    .col-7-purple {
      background: #f4efff !important;
      color: #6c55a3 !important;
    }
    .col-9-purple {
      background: #faf7ff !important;
      color: #8a7ab4 !important;
    }
    .sticky-col.col-7-purple {
      background: #efe8ff !important;
    }
    .sticky-col.col-9-purple {
      background: #f7f2ff !important;
    }
    tr.eliminated .col-7-purple,
    tr.eliminated .col-9-purple {
      color: #502800 !important;
    }


    .uniform-study-th .th-inner,
    .uniform-study-filter .header-filter-box {
      min-width: 0 !important;
    }
    .uniform-study-th .th-label {
      font-size: 15px !important;
      font-weight: 700 !important;
      white-space: nowrap !important;
      word-break: keep-all !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
    }
    .uniform-study-filter .header-filter-text,
    .uniform-study-filter .header-filter-select {
      font-size: 14px !important;
      min-height: 36px !important;
      height: 36px !important;
    }
    .uniform-study-filter .filter-status {
      font-size: 12px !important;
      min-height: 18px !important;
      height: 18px !important;
    }
    .uniform-study-td {
      font-size: 23px !important;
      font-weight: 800 !important;
      line-height: 1.18 !important;
      text-align: center !important;
      white-space: normal !important;
      overflow-wrap: anywhere !important;
      word-break: break-word !important;
    }


    .uniform-narrow-col {
      width: 16px !important;
      min-width: 16px !important;
      max-width: 16px !important;
    }

@media (max-width: 900px) {
      .page { padding: 8px 8px 14px; }
      h2 { font-size: 21px; }
      th, td { font-size: 15px; padding: 5px; }
      thead tr.header-row th { height: 52px; }
      thead tr.filter-row th { top: 52px; height: 100px; }
      .th-inner, .header-filter-box { min-width: 72px; }
      .first-col-emphasis { font-size: 19px !important; }
      .first-col-filter { font-size: 13px !important; }
      .first-col-huge { font-size: 22px !important; }
      .first-col-filter-huge .header-filter-text,
      .first-col-filter-huge .header-filter-select { font-size: 14px !important; }
      .second-col-emphasis { font-size: 17px !important; }
      .second-col-filter { font-size: 12px !important; }
      .second-col-huge { font-size: 19px !important; }
      .second-col-filter-huge .header-filter-text,
      .second-col-filter-huge .header-filter-select { font-size: 13px !important; }
    }
    @media (pointer: coarse) {
      #columnPopover {
        top: 48px;
        right: 6px;
        width: min(420px, calc(100vw - 12px));
        max-height: 76vh;
      }
      .col-resizer {
        right: -10px;
        width: 22px;
      }
      .col-resizer::after {
        left: 10px;
        width: 3px;
      }
      .tool-btn {
        padding: 6px 9px;
        font-size: 13px;
      }
      #columnToolBar {
        gap: 8px;
      }
    }
    @keyframes progress-slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(360%); }
    }
  </style>
</head>
<body>
<div class="page">
  <h2>CocaCrush口渴单词消消乐</h2>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  <span id="fileNotice"></span>
  <div id="progressPanel">
    <div id="progressText"></div>
    <div id="progressSubText"></div>
    <div id="progressBar"></div>
  </div>
  <div id="sheetWrap">
    <label for="sheetSelect">工作表：</label>
    <select id="sheetSelect"></select>
    <span id="sheetHint">上传多 sheet 文件后可在这里切换</span>
  </div>
  <div id="btnBar">
    <button onclick="toggleHideEliminated()" id="toggleHideBtn">隐藏已消灭单词</button>
    <button onclick="exportProgress()">导出进度文档</button>
    <button onclick="importProgress()">导入进度文档</button>
    <select id="sortSelect">
      <option value="origin">原顺序</option>
      <option value="alpha-asc">首字母A-Z</option>
      <option value="alpha-desc">首字母Z-A</option>
      <option value="tail-asc">尾字母A-Z</option>
      <option value="tail-desc">尾字母Z-A</option>
      <option value="len-asc">单词字符数小到大</option>
      <option value="len-desc">单词字符数大到小</option>
    </select>
    <input id="searchBox" placeholder="关键词/支持*?">
    <button onclick="doSearch()">关键词查找</button>
    <button onclick="clearSearch()">清除查询</button>
    <button id="clearHeaderFiltersBtn" onclick="clearHeaderFilters()">清空表头筛选</button>
    <button onclick="toggleColumnPanel()" id="toggleColumnPanelBtn">列显示</button>
  </div>
  <div id="columnPopover">
    <div id="columnToolBar">
      <span id="selectedColumnLabel"></span>
      <button class="tool-btn" onclick="adjustSelectedColumnWidth(-40)">窄一点</button>
      <button class="tool-btn" onclick="adjustSelectedColumnWidth(40)">宽一点</button>
      <button class="tool-btn" onclick="autoFitSelectedColumn()">自动列宽</button>
      <button class="tool-btn" id="toggleFirstColHugeBtn" onclick="toggleFirstColHugeMode()">首列超大</button>
      <button class="tool-btn" onclick="resetAllColumnWidths()">恢复默认列宽</button>
    </div>
    <div id="columnPanel">
      <div id="columnPanelHeader">
        <div id="columnPanelTitle">列显示</div>
        <div id="columnPanelActions">
          <button class="tool-btn" onclick="showAllColumns()">全部显示</button>
          <button class="tool-btn" onclick="showOnlyCoreColumns()">仅前两列</button>
          <button class="tool-btn" id="focusWordBtn" onclick="showWordFocusMode()">只看单词列</button>
          <button class="tool-btn" id="focusPhoneticBtn" onclick="showPhoneticFocusMode()">只看音标列</button>
          <button class="tool-btn" id="exitFocusBtn" onclick="exitStudyFocusMode()">退出专注</button>
          <button class="icon-btn" onclick="closeColumnPanel()">×</button>
        </div>
      </div>
      <div id="columnCheckboxList"></div>
    </div>
  </div>

function getPresetGroupFilters(columnIndex) {

function encodePresetGroupFilter(patternText) {
  return "__GROUP__:" + patternText;
}

function decodePresetGroupFilter(value) {

function isPresetGroupFilterValue(value) {
  return String(value || "").startsWith("__GROUP__:");

const ACTION_COLUMN_WIDTH = 52;
const TOUCH_RESIZE_SPEED = 2.2;
const HEADER_LONG_PRESS_MS = 260;
const STICKY_COLUMN_COUNT = 3;
const FIXED_CORE_COLUMN_WIDTH = 72;

function getStorageKey() {
  return STORAGE_PREFIX + (fileName || "unknown") + "_" + (currentSheetName || "sheet") + "_" + (fileHash || "0");
}

function quickHash(arr) {
  const s = JSON.stringify(arr).slice(0, 4000);
  let hash = 0;
  for (let i = 0; i < s.length; i++) {
    hash = ((hash << 5) - hash) + s.charCodeAt(i);
    hash |= 0;
  }
  return hash + "_" + (arr.length || 0);
}

function normalizeCell(value) {
  if (value == null) return "";
  return String(value).trim();
}

function prepareRows(rows) {
  const safeRows = Array.isArray(rows) ? rows.filter(row => Array.isArray(row)) : [];
  const width = safeRows.reduce((max, row) => Math.max(max, row.length), 0);
  if (!width || !safeRows.length) return { headers: [], rows: [] };
  const normalizedRows = safeRows.map(row => Array.from({ length: width }, (_, idx) => normalizeCell(row[idx])));
  const headerRow = normalizedRows[0].map((value, idx) => value || `列${idx + 1}`);
  const bodyRows = normalizedRows.slice(1).filter(row => row.some(cell => cell !== ""));
  return { headers: headerRow, rows: bodyRows };
}

function getWordColumnIndex() {
  let idx = headers.findIndex(h => normalizeCell(h).toLowerCase().includes("word"));
  if (idx < 0) idx = 0;
  return idx;
}

function getWordKey(row) {
  return normalizeCell(row[getWordColumnIndex()]).toLowerCase();
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function isNumericValue(value) {
  if (value === "") return false;
  return /^-?\d+(?:\.\d+)?$/.test(value.replace(/,/g, ""));
}

function compareValues(a, b) {
  const av = normalizeCell(a);
  const bv = normalizeCell(b);
  if (av === bv) return 0;
  if (av === "") return 1;
  if (bv === "") return -1;
  if (isNumericValue(av) && isNumericValue(bv)) {
    return Number(av.replace(/,/g, "")) - Number(bv.replace(/,/g, ""));
  }
  return av.localeCompare(bv, "zh-Hans-CN", { numeric: true, sensitivity: "base" });
}

function escapeWildcardSource(text) {
  return normalizeCell(text).replace(/[-/\\^$+.()|[\]{}]/g, '\\$&');
}

function buildWildcardRegExp(keyword) {
  let pattern = normalizeCell(keyword);
  if (!pattern) return null;
  pattern = escapeWildcardSource(pattern);
  pattern = pattern.replace(/\*/g, ".*").replace(/\?/g, ".");
  return new RegExp("^" + pattern + "$", "i");
}

function buildWildcardRegExpList(text) {
  const tokens = normalizeCell(text).split(/\s+/).filter(Boolean);
  return tokens.map(token => buildWildcardRegExp(token)).filter(Boolean);
}

function matchesWildcardList(value, patternText) {
  const regs = buildWildcardRegExpList(patternText);
  if (!regs.length) return true;
  const cell = normalizeCell(value);
  return regs.some(reg => reg.test(cell));
}
function syncColumnFilters() {
  if (columnTextFilters.length !== headers.length) {
    columnTextFilters = Array.from({ length: headers.length }, (_, idx) => columnTextFilters[idx] || "");
  }
  if (columnExactFilters.length !== headers.length) {
    columnExactFilters = Array.from({ length: headers.length }, (_, idx) => columnExactFilters[idx] || FILTER_ALL);
  }
}

function clearFilterState() {
  columnTextFilters = Array.from({ length: headers.length }, () => "");
  columnExactFilters = Array.from({ length: headers.length }, () => FILTER_ALL);
  headerSort = { index: -1, direction: "" };
}

function clearFilterOptionCache() {
  filterOptionCache.clear();
  filterOptionCacheStateKey = "";
  loadedFilterOptionKeys.clear();
  loadingFilterOptionKeys.clear();
}

function getFilterOptionStateKey() {
  return JSON.stringify({
    sheet: currentSheetName,
    hash: fileHash,
    search: normalizeCell(globalSearchText).toLowerCase(),
    hideEliminated,
    eliminated: hideEliminated ? Array.from(eliminatedWords).sort() : [],
    textFilters: columnTextFilters.map(value => normalizeCell(value).toLowerCase()),
    exactFilters: columnExactFilters.slice(),
    visibleColumns: visibleColumns.map(value => value !== false)
  });
}

function syncFilterOptionCache(stateKey) {
  if (filterOptionCacheStateKey !== stateKey) {
    filterOptionCacheStateKey = stateKey;
    filterOptionCache.clear();
    loadedFilterOptionKeys.clear();
    loadingFilterOptionKeys.clear();
  }
}

function getFilterCacheKey(columnIndex, stateKey) {
  return `${columnIndex}|${stateKey}`;
}

function syncVisibleColumns(forceReset = false) {
  if (forceReset || visibleColumns.length !== headers.length) {
    visibleColumns = headers.map((_, index) => forceReset ? true : visibleColumns[index] !== false);
  }
}

function estimateColumnWidth(index) {
  const headerLength = normalizeCell(headers[index]).length;
  const sampleRows = origData.slice(0, 40);
  let maxLength = headerLength;
  for (const row of sampleRows) {
    maxLength = Math.max(maxLength, normalizeCell(row[index]).length);
  }
  const baseWidth = Math.min(560, Math.max(MIN_COLUMN_WIDTH, maxLength * 18 + 36));
  if (index === 0 || index === 1) return FIXED_CORE_COLUMN_WIDTH;
  if (index === 2) return THIRD_STICKY_COLUMN_WIDTH;
  if (index === 4) return baseWidth + 24;
  if (index >= 5 && index <= 12) return UNIFORM_STUDY_COLUMN_WIDTH;
  return baseWidth;
}

function syncColumnWidths(forceReset = false) {
  if (forceReset || columnWidths.length !== headers.length) {
    columnWidths = headers.map((_, index) => {
      const existing = columnWidths[index];
      const fixed = getColumnFixedWidth(index);
      if (fixed != null) return fixed;
      const minWidth = getColumnMinWidth(index);
      return typeof existing === "number" && existing >= minWidth ? existing : estimateColumnWidth(index);
    });
  }
}

function fitColumnWidthsToViewport() {
  if (!headers.length) return;
  const wrap = document.getElementById("wordTable")?.parentElement;
  const visibleIndices = getVisibleColumnIndices();
  if (!wrap || !visibleIndices.length) return;
  const availableWidth = Math.max(wrap.clientWidth - ACTION_COLUMN_WIDTH - 12, 0);
  if (!availableWidth) return;
  const fixedIndices = visibleIndices.filter(index => getColumnFixedWidth(index) != null);
  const flexIndices = visibleIndices.filter(index => getColumnFixedWidth(index) == null);
  let usedWidth = 0;
  fixedIndices.forEach(index => {
    const fixed = getColumnFixedWidth(index);
    columnWidths[index] = fixed;
    usedWidth += fixed;
  });
  if (!flexIndices.length) return;
  const remainingWidth = Math.max(availableWidth - usedWidth, 0);
  const sourceWidths = flexIndices.map(index => Math.max(FIT_MIN_COLUMN_WIDTH, columnWidths[index] || estimateColumnWidth(index)));
  const totalWidth = sourceWidths.reduce((sum, width) => sum + width, 0);
  if (!totalWidth) return;
  const scaledWidths = totalWidth <= remainingWidth
    ? sourceWidths.map(width => width * (remainingWidth / totalWidth))
    : sourceWidths.map(width => Math.max(FIT_MIN_COLUMN_WIDTH, width * (remainingWidth / totalWidth)));
  let roundedTotal = 0;
  scaledWidths.forEach((width, position) => {
    const rounded = position === scaledWidths.length - 1
      ? Math.max(FIT_MIN_COLUMN_WIDTH, Math.round(remainingWidth - roundedTotal))
      : Math.max(FIT_MIN_COLUMN_WIDTH, Math.round(width));
    columnWidths[flexIndices[position]] = rounded;
    roundedTotal += rounded;
  });
}


function getVisibleColumnIndices() {
  syncVisibleColumns();
  const indices = [];
  for (let i = 0; i < headers.length; i++) {
    if (visibleColumns[i] !== false) indices.push(i);
  }
  return indices;
}

function ensureSelectedColumn() {
  const visibleIndices = getVisibleColumnIndices();
  if (!visibleIndices.length) {
    selectedColumnIndex = -1;
    return;
  }
  if (!visibleIndices.includes(selectedColumnIndex)) {
    selectedColumnIndex = visibleIndices[0];
  }
}

function getStickyConfig(visibleIndices) {
  const stickyMap = new Map();
  let left = 0;
  visibleIndices.slice(0, STICKY_COLUMN_COUNT).forEach((columnIndex, order) => {
    stickyMap.set(columnIndex, { left, last: order === STICKY_COLUMN_COUNT - 1 || order === visibleIndices.length - 1 });
    left += columnWidths[columnIndex];
  });
  return stickyMap;
}

function setLoadingState(loading, text = "") {

  const panel = document.getElementById("progressPanel");
  const progressText = document.getElementById("progressText");

  panel.style.display = loading ? "block" : "none";

function getWorkbookWorker() {
  if (workbookWorker) return workbookWorker;
  const workerSource = `
    importScripts("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js");
    let cachedSheets = [];
    function normalizeCell(value) {
      if (value == null) return "";
      return String(value).trim();
    }
    function prepareRows(rows) {
      const safeRows = Array.isArray(rows) ? rows.filter(row => Array.isArray(row)) : [];
      const width = safeRows.reduce((max, row) => Math.max(max, row.length), 0);
      if (!width || !safeRows.length) return { headers: [], rows: [] };
      const normalizedRows = safeRows.map(row => Array.from({ length: width }, (_, idx) => normalizeCell(row[idx])));
      const headerRow = normalizedRows[0].map((value, idx) => value || ("列" + (idx + 1)));
      const bodyRows = normalizedRows.slice(1).filter(row => row.some(cell => cell !== ""));
      return { headers: headerRow, rows: bodyRows };
    }
    self.onmessage = event => {
      const message = event.data || {};
      try {
        if (message.type === "loadWorkbook") {
          const workbook = XLSX.read(message.payload, {
            type: message.fileType === "csv-text" ? "string" : "array"
          });
          cachedSheets = workbook.SheetNames.map(name => ({
            name,
            rows: XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1, raw: false, defval: "" })
          }));
          const firstSheet = cachedSheets[0] || { name: "Sheet1", rows: [] };
          const prepared = prepareRows(firstSheet.rows);
          self.postMessage({
            type: "workbookLoaded",
            sheetNames: cachedSheets.map(item => item.name),
            sheetName: firstSheet.name,
            headers: prepared.headers,
            rows: prepared.rows
          });
          return;
        }
        if (message.type === "loadSheet") {
          const found = cachedSheets.find(item => item.name === message.sheetName);
          if (!found) throw new Error("未找到对应工作表");
          const prepared = prepareRows(found.rows);
          self.postMessage({
            type: "sheetLoaded",
            sheetName: found.name,
            headers: prepared.headers,
            rows: prepared.rows
          });
        }
      } catch (error) {
        self.postMessage({
          type: "error",
          message: error && error.message ? error.message : "解析工作簿失败"
        });
      }
    };
  `;
  const workerBlob = new Blob([workerSource], { type: "application/javascript" });
  workbookWorker = new Worker(URL.createObjectURL(workerBlob));
  workbookWorker.onmessage = event => {
    const message = event.data || {};
    if (message.type === "error") {
      setLoadingState(false, "");
      alert(message.message || "解析工作簿失败");
      return;
    }
    if (message.type === "workbookLoaded") {
      workbookSheets = (message.sheetNames || []).map(name => ({ name }));
      populateSheetSelect();
      applySheetPayload(message.sheetName, message.headers || [], message.rows || [], true);
      return;
    }
    if (message.type === "sheetLoaded") {
      applySheetPayload(message.sheetName, message.headers || [], message.rows || [], false);
    }
  };
  workbookWorker.onerror = () => {
    setLoadingState(false, "");
    alert("后台解析工作簿失败");
  };
  return workbookWorker;
}

function applyRenderedColumnWidth(index) {
  const col = document.getElementById(`col-width-${index}`);
  if (col) col.style.width = `${columnWidths[index]}px`;
}

function applyRenderedColumnWidths(indices) {
  indices.forEach(index => applyRenderedColumnWidth(index));
}

function clearHeaderGesture() {
  if (headerLongPressTimer) {
    clearTimeout(headerLongPressTimer);
    headerLongPressTimer = null;
  }
  if (activeHeaderGesture) {
    const th = document.getElementById(`header-cell-${activeHeaderGesture.index}`);
    if (th) th.classList.remove("touch-resize-active");
  }
  activeHeaderGesture = null;
}

function getResizeTargetIndices(index) {
  const visibleIndices = getVisibleColumnIndices();
  const startPosition = visibleIndices.indexOf(index);
  if (startPosition < 0) return [index];
  return visibleIndices.slice(startPosition);
}

function shouldIgnoreHeaderGesture(event) {
  const target = event.target;
  if (!target || !target.closest) return false;
  return !!target.closest(".col-resizer, .sort-btn, .small-btn, input, select, button");
}

function beginHeaderTouchResize(index, event) {
  if (!headers.length) return;
  if (event.pointerType === "touch") {
    return;
  }
  if (shouldIgnoreHeaderGesture(event)) return;
}

function startResize(index, event) {
  if (!headers.length) return;
  syncColumnWidths();
  selectColumn(index);
  const targetIndices = getResizeTargetIndices(index);
  activeResize = {
    index,
    startX: event.clientX,
    startWidth: columnWidths[index],
    pointerType: event.pointerType || "mouse",
    targetIndices,
    startWidths: columnWidths.slice()
  };
  document.body.style.userSelect = "none";
  document.body.style.cursor = "col-resize";
  const th = document.getElementById(`header-cell-${index}`);
  if (th) th.classList.add("resizing");
  window.addEventListener("pointermove", handlePointerMove, { passive: true });
  window.addEventListener("pointerup", handlePointerUp, { passive: true });
  window.addEventListener("pointercancel", handlePointerUp, { passive: true });
  event.preventDefault();
  event.stopPropagation();
}

function autoFitColumn(index) {
  syncColumnWidths();
  const fixed = getColumnFixedWidth(index);
  columnWidths[index] = fixed != null ? fixed : estimateColumnWidth(index);
  renderTable();
  renderPagination();
  updateStatBar();
}

function resizeColumnsFromGesture(deltaX) {
  if (!activeResize) return;
  const isTouch = activeResize.pointerType === "touch";
  const scaledDelta = deltaX * (isTouch ? TOUCH_RESIZE_SPEED : 1);
  if (!isTouch) {
    const fixed = getColumnFixedWidth(activeResize.index);
    columnWidths[activeResize.index] = fixed != null ? fixed : Math.max(getColumnMinWidth(activeResize.index), activeResize.startWidth + scaledDelta);
    applyRenderedColumnWidth(activeResize.index);
    return;
  }
  const nextWidths = activeResize.startWidths.slice();
  if (scaledDelta >= 0) {
    nextWidths[activeResize.index] = Math.max(MIN_COLUMN_WIDTH, activeResize.startWidth + scaledDelta);
  } else {
    let remainingShrink = Math.abs(scaledDelta);
    for (const index of activeResize.targetIndices) {
      const minWidth = getColumnFixedWidth(index) != null ? getColumnFixedWidth(index) : FIT_MIN_COLUMN_WIDTH;
      const available = Math.max(0, nextWidths[index] - minWidth);
      if (!available) continue;
      const consumed = Math.min(available, remainingShrink);
      nextWidths[index] -= consumed;
      remainingShrink -= consumed;
      if (remainingShrink <= 0) break;
    }
  }
  activeResize.targetIndices.forEach(index => {
    const fixed = getColumnFixedWidth(index);
    columnWidths[index] = fixed != null ? fixed : Math.max(FIT_MIN_COLUMN_WIDTH, nextWidths[index]);
  });
  applyRenderedColumnWidths(activeResize.targetIndices);
}

function selectColumn(index) {
  if (index < 0 || index >= headers.length || visibleColumns[index] === false) return;
  selectedColumnIndex = index;
  updateColumnToolBar();
  renderTable();
}

function adjustSelectedColumnWidth(delta) {
  ensureSelectedColumn();
  if (selectedColumnIndex < 0) return;
  syncColumnWidths();
  const fixed = getColumnFixedWidth(selectedColumnIndex);
  if (fixed != null) { columnWidths[selectedColumnIndex] = fixed; } else {
    columnWidths[selectedColumnIndex] = Math.max(getColumnMinWidth(selectedColumnIndex), columnWidths[selectedColumnIndex] + delta);
  }
  renderTable();
  renderPagination();
}

function autoFitSelectedColumn() {
  ensureSelectedColumn();
  if (selectedColumnIndex < 0) return;
  autoFitColumn(selectedColumnIndex);
}

function resetAllColumnWidths() {
  syncColumnWidths(true);
  renderTable();
  renderPagination();
}

function toggleColumnPanel() {
  if (!headers.length) return;
  columnPanelVisible = !columnPanelVisible;
  renderColumnPanel();
  updateColumnToolBar();
}

function closeColumnPanel() {
  if (!columnPanelVisible) return;
  columnPanelVisible = false;
  renderColumnPanel();
  updateColumnToolBar();
}

function maybeCloseColumnPanel(event) {
  if (!columnPanelVisible) return;
  const target = event.target;
  if (!target || !target.closest) return;
  if (target.closest("#columnPopover") || target.closest("#toggleColumnPanelBtn")) return;
  closeColumnPanel();
}

function toggleColumnVisibility(index, checked) {
  syncVisibleColumns();
  const visibleCount = getVisibleColumnIndices().length;
  if (!checked && visibleCount <= 1) {
    renderColumnPanel();
    return;
  }
  studyFocusMode = "all";
  preFocusVisibleColumns = null;
  visibleColumns[index] = checked;
  if (!checked) {
    columnTextFilters[index] = "";
    columnExactFilters[index] = FILTER_ALL;
  }
  ensureSelectedColumn();
  renderAll();
}

function showAllColumns() {
  syncVisibleColumns(true);
  studyFocusMode = "all";
  preFocusVisibleColumns = null;
  ensureSelectedColumn();
  renderAll();
}

function showOnlyCoreColumns() {
  syncVisibleColumns(true);
  visibleColumns = headers.map((_, index) => index < 2);
  studyFocusMode = "all";
  preFocusVisibleColumns = null;
  ensureSelectedColumn();
  renderAll();
}

function toggleFirstColHugeMode() {
  firstColHugeMode = !firstColHugeMode;
  saveProgress();
  renderAll();
}

function applyStudyFocusMode(mode) {
  syncVisibleColumns();
  if (mode === "all") {
    if (preFocusVisibleColumns && preFocusVisibleColumns.length === headers.length) {
      visibleColumns = preFocusVisibleColumns.slice();
    } else {
      visibleColumns = headers.map((_, index) => visibleColumns[index] !== false);
    }
    studyFocusMode = "all";
    preFocusVisibleColumns = null;
  } else {
    if (studyFocusMode === "all") preFocusVisibleColumns = visibleColumns.slice();
    visibleColumns = headers.map((_, index) => mode === "word" ? index === 0 : index === 1);
    studyFocusMode = mode;
  }
  ensureSelectedColumn();
  saveProgress();
  renderAll();
}

function showWordFocusMode() {
  if (!headers[0]) return;
  applyStudyFocusMode("word");
}

function showPhoneticFocusMode() {
  if (!headers[1]) return;
  applyStudyFocusMode("phonetic");
}

function exitStudyFocusMode() {
  if (studyFocusMode === "all") return;
  applyStudyFocusMode("all");
}

function applySheetPayload(sheetName, nextHeaders, nextRows, resetSheetSelect) {
  currentSheetName = sheetName || "";
  headers = Array.isArray(nextHeaders) ? nextHeaders.slice() : [];
  origData = Array.isArray(nextRows) ? nextRows.map(row => row.slice()) : [];
  data = origData.map(row => row.slice());
  fileHash = quickHash([currentSheetName, ...origData]);
  eliminatedWords = new Set();
  resetViewState();
  clearFilterOptionCache();
  tryRestore();
  syncVisibleColumns();
  ensureSelectedColumn();
  applySorting();
  if (resetSheetSelect) populateSheetSelect();
  const sheetSelect = document.getElementById("sheetSelect");
  if (sheetSelect && currentSheetName) sheetSelect.value = currentSheetName;
  document.getElementById("topBtns").style.display = headers.length ? "" : "none";
  document.getElementById("fileNotice").textContent = currentSheetName ? `已加载工作表：${currentSheetName}` : "";
  setLoadingState(false, currentSheetName ? `已加载工作表：${currentSheetName}` : "");
  renderAll();
}

function handlePointerMove(event) {
  if (activeHeaderGesture && !activeHeaderGesture.activated) {
    const moveX = Math.abs(event.clientX - activeHeaderGesture.startX);
    const moveY = Math.abs(event.clientY - activeHeaderGesture.startY);
    if (moveX > 12 || moveY > 12) clearHeaderGesture();
  }
  if (activeResize) {
    resizeColumnsFromGesture(event.clientX - activeResize.startX);
    return;
  }
  if (!activeSliderDrag) return;
  const wrap = document.getElementById("pageSliderWrap");
  const totalPages = Math.max(activeSliderDrag.totalPages, 1);
  const track = Math.max(wrap.clientHeight - activeSliderDrag.thumbHeight, 1);
  const step = totalPages > 1 ? track / (totalPages - 1) : track;
  const movedPages = Math.round((event.clientY - activeSliderDrag.startY) / step);
  const nextPage = Math.min(totalPages, Math.max(1, activeSliderDrag.startPage + movedPages));
  if (nextPage !== currentPage) {
    currentPage = nextPage;
    renderTable();
    renderPagination();
  }
}

function handlePointerUp() {
  if (activeResize) {
    const th = document.getElementById(`header-cell-${activeResize.index}`);
    if (th) th.classList.remove("resizing");
    activeResize = null;
    renderTable();
    renderPagination();
  }
  clearHeaderGesture();
  activeSliderDrag = null;
  document.body.style.userSelect = "";
  document.body.style.cursor = "";
  window.removeEventListener("pointermove", handlePointerMove);
  window.removeEventListener("pointerup", handlePointerUp);
  window.removeEventListener("pointercancel", handlePointerUp);
}

function updateStatBar() {
  const statBar = document.getElementById("statBar");
  if (!headers.length) {
    statBar.textContent = "";
    return;
  }
  const visibleCount = getVisibleIndices().length;
  const total = origData.length;
  const eliminatedCount = eliminatedWords.size;
  const left = Math.max(total - eliminatedCount, 0);
  const filterCount = columnTextFilters.filter(Boolean).length + columnExactFilters.filter(value => value && value !== FILTER_ALL).length;
  const sortText = headerSort.index >= 0
    ? `表头排序：${headers[headerSort.index]} ${headerSort.direction === "asc" ? "↑" : "↓"}`
    : `顶部排序：${document.getElementById("sortSelect").selectedOptions[0].text}`;
  const searchText = globalSearchText ? ` | 关键词：${globalSearchText}` : "";
  const filterText = filterCount ? ` | 表头筛选：${filterCount} 项` : "";
  statBar.textContent = `已消灭单词：${eliminatedCount} 个 | 剩余：${left} 个 | 总计：${total} 条 | 当前显示：${visibleCount} 条 | 每页：${pageSize} 条 | ${sortText}${searchText}${filterText}`;
}

function tryRestore() {
  const raw = localStorage.getItem(getStorageKey());
  const obj = raw ? JSON.parse(raw) : null;
  if (obj && obj.hash === fileHash) {
    eliminatedWords = new Set(obj.eliminatedWords || []);
    currentPage = obj.currentPage || 1;
    if (Array.isArray(obj.columnWidths) && obj.columnWidths.length === headers.length) {
      columnWidths = obj.columnWidths.map((value, index) => { const fixed = getColumnFixedWidth(index); return fixed != null ? fixed : Math.max(getColumnMinWidth(index), Number(value) || getColumnMinWidth(index)); });
    }
    if (Array.isArray(obj.visibleColumns) && obj.visibleColumns.length === headers.length) {
      visibleColumns = obj.visibleColumns.map(value => value !== false);
    }
    firstColHugeMode = obj.firstColHugeMode === true;
    studyFocusMode = typeof obj.studyFocusMode === "string" ? obj.studyFocusMode : "all";
    document.getElementById("fileNotice").textContent = `已恢复上次进度${currentSheetName ? "：" + currentSheetName : ""}`;
  } else {
    firstColHugeMode = false;
    studyFocusMode = "all";
    document.getElementById("fileNotice").textContent = currentSheetName ? `已加载工作表：${currentSheetName}` : "";
  }
}

function persistProgressNow() {
  localStorage.setItem(getStorageKey(), JSON.stringify({
    hash: fileHash,
    eliminatedWords: Array.from(eliminatedWords),
    currentPage,
    columnWidths,
    visibleColumns,
    firstColHugeMode,
    studyFocusMode
  }));
}

function saveProgress(immediate = false) {
  if (saveProgressTimer) {
    clearTimeout(saveProgressTimer);
    saveProgressTimer = null;
  }
  if (immediate) {
    persistProgressNow();
    return;
  }
  saveProgressTimer = setTimeout(() => {
    saveProgressTimer = null;
    persistProgressNow();
  }, 120);
}

function exportProgress() {
  if (!headers.length) return alert("未加载词表");
  const payload = {
    hash: fileHash,
    sheetName: currentSheetName,
    eliminatedWords: Array.from(eliminatedWords),
    columnWidths,
    visibleColumns,
    firstColHugeMode,
    studyFocusMode
  };
  const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
  const link = document.createElement("a");
  const date = new Date().toISOString().slice(0, 10);
  const baseName = fileName.replace(/\.[^.]+$/, "");
  const sheetSuffix = currentSheetName ? "_" + currentSheetName : "";
  link.download = `${baseName}${sheetSuffix}_进度文档_${date}.json`;
  link.href = URL.createObjectURL(blob);
  link.click();
}

function importProgress() {
  if (!headers.length) return alert("请先加载词表");
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = event => {
      try {
        const obj = JSON.parse(event.target.result);
        if (obj.hash !== fileHash) return alert("进度文档与当前词表不匹配！");
        eliminatedWords = new Set(obj.eliminatedWords || []);
        if (Array.isArray(obj.columnWidths) && obj.columnWidths.length === headers.length) {
          columnWidths = obj.columnWidths.map((value, index) => { const fixed = getColumnFixedWidth(index); return fixed != null ? fixed : Math.max(getColumnMinWidth(index), Number(value) || getColumnMinWidth(index)); });
        }
        if (Array.isArray(obj.visibleColumns) && obj.visibleColumns.length === headers.length) {
          visibleColumns = obj.visibleColumns.map(value => value !== false);
        }
        firstColHugeMode = obj.firstColHugeMode === true;
        studyFocusMode = typeof obj.studyFocusMode === "string" ? obj.studyFocusMode : "all";
        ensureSelectedColumn();
        saveProgress();
        renderAll();
      } catch {
        alert("进度文档格式错误！");
      }
    };
    reader.readAsText(file, "utf-8");
  };
  input.click();
}

function applySorting() {
  data = origData.map(row => row.slice());
  const preset = document.getElementById("sortSelect").value;
  const wordIdx = getWordColumnIndex();
  if (headerSort.index >= 0 && headerSort.direction) {
    const targetIndex = headerSort.index;
    const direction = headerSort.direction === "asc" ? 1 : -1;
    data.sort((a, b) => {
      const compared = compareValues(a[targetIndex], b[targetIndex]);
      if (compared !== 0) return compared * direction;
      return compareValues(a[wordIdx], b[wordIdx]);
    });
    return;
  }
  if (preset === "origin") return;
  if (preset === "alpha-asc") {
    data.sort((a, b) => compareValues(a[wordIdx], b[wordIdx]));
  } else if (preset === "alpha-desc") {
    data.sort((a, b) => compareValues(b[wordIdx], a[wordIdx]));
  } else if (preset === "tail-asc") {
    data.sort((a, b) => compareValues(normalizeCell(a[wordIdx]).slice(-1), normalizeCell(b[wordIdx]).slice(-1)) || compareValues(a[wordIdx], b[wordIdx]));
  } else if (preset === "tail-desc") {
    data.sort((a, b) => compareValues(normalizeCell(b[wordIdx]).slice(-1), normalizeCell(a[wordIdx]).slice(-1)) || compareValues(a[wordIdx], b[wordIdx]));
  } else if (preset === "len-asc") {
    data.sort((a, b) => normalizeCell(a[wordIdx]).length - normalizeCell(b[wordIdx]).length || compareValues(a[wordIdx], b[wordIdx]));
  } else if (preset === "len-desc") {
    data.sort((a, b) => normalizeCell(b[wordIdx]).length - normalizeCell(a[wordIdx]).length || compareValues(a[wordIdx], b[wordIdx]));
  }
}

function passesSearch(row) {
  if (!globalSearchText) return true;
  const reg = buildWildcardRegExp(globalSearchText);
  if (!reg) return true;
  return reg.test(normalizeCell(row[getWordColumnIndex()]));
}

function passesColumnFilters(row, ignoreColumn = -1) {
  for (let idx = 0; idx < headers.length; idx++) {
    if (idx === ignoreColumn) continue;
    const textFilter = normalizeCell(columnTextFilters[idx]);
    const exactFilter = columnExactFilters[idx] || FILTER_ALL;
    const cell = normalizeCell(row[idx]);
    if (textFilter && !matchesWildcardList(cell, textFilter)) return false;
    if (exactFilter === FILTER_BLANK && cell !== "") return false;
    if (exactFilter === FILTER_NONBLANK && cell === "") return false;
    if (isPresetGroupFilterValue(exactFilter)) {
      const groupPattern = decodePresetGroupFilter(exactFilter);
      if (!matchesWildcardList(cell, groupPattern)) return false;
      continue;
    }
    if (exactFilter !== FILTER_ALL && exactFilter !== FILTER_BLANK && exactFilter !== FILTER_NONBLANK && cell !== exactFilter) return false;
  }
  return true;
}

function passesHideEliminated(row) {
  if (!hideEliminated) return true;
  return !eliminatedWords.has(getWordKey(row));
}

function getVisibleIndices(ignoreColumn = -1) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    const row = data[i];
    if (!passesSearch(row)) continue;
    if (!passesHideEliminated(row)) continue;
    if (!passesColumnFilters(row, ignoreColumn)) continue;
    result.push(i);
  }
  return result;
}

function clampCurrentPage() {
  const totalPages = Math.max(1, Math.ceil(getVisibleIndices().length / pageSize));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
}

function getExactOptions(columnIndex, stateKey) {
  syncFilterOptionCache(stateKey);
  const cacheKey = getFilterCacheKey(columnIndex, stateKey);
  if (filterOptionCache.has(cacheKey)) {
    const cachedItems = filterOptionCache.get(cacheKey).map(item => ({ ...item }));
    const current = columnExactFilters[columnIndex] || FILTER_ALL;
    if (![FILTER_ALL, FILTER_BLANK, FILTER_NONBLANK].includes(current) && !isPresetGroupFilterValue(current) && current && !cachedItems.some(item => item.value === current)) {
      cachedItems.unshift({ value: current, count: 0 });
    }
    return cachedItems;
  }
  const countMap = new Map();
  const indices = getVisibleIndices(columnIndex);
  for (const rowIndex of indices) {
    const value = normalizeCell(data[rowIndex][columnIndex]);
    countMap.set(value, (countMap.get(value) || 0) + 1);
  }
  const items = Array.from(countMap.entries())
    .map(([value, count]) => ({ value, count }))
    .sort((a, b) => compareValues(a.value, b.value));
  filterOptionCache.set(cacheKey, items.map(item => ({ ...item })));
  const current = columnExactFilters[columnIndex] || FILTER_ALL;
  if (![FILTER_ALL, FILTER_BLANK, FILTER_NONBLANK].includes(current) && !isPresetGroupFilterValue(current) && current && !countMap.has(current)) {
    items.unshift({ value: current, count: 0 });
  }
  return items;
}

function buildExactOptionsHtml(columnIndex, stateKey) {
  syncFilterOptionCache(stateKey);
  const current = columnExactFilters[columnIndex] || FILTER_ALL;
  const cacheKey = getFilterCacheKey(columnIndex, stateKey);
  const loaded = loadedFilterOptionKeys.has(cacheKey) && filterOptionCache.has(cacheKey);
  const baseIndices = getVisibleIndices(columnIndex);
  const totalCount = baseIndices.length;
  let blankCount = 0;
  let nonBlankCount = 0;
  for (const rowIndex of baseIndices) {
    const value = normalizeCell(data[rowIndex][columnIndex]);
    if (value === "") blankCount++;
    else nonBlankCount++;
  }
  const options = [
    { value: FILTER_ALL, label: `全部 (${totalCount})`, disabled: false },
    { value: FILTER_NONBLANK, label: `非空 (${nonBlankCount})`, disabled: false },
    { value: FILTER_BLANK, label: `空白 (${blankCount})`, disabled: false }
  ];
  const presetGroups = getPresetGroupFilters(columnIndex);
  if (presetGroups.length) {
    presetGroups.forEach(patternText => {
      options.push({
        value: encodePresetGroupFilter(patternText),
        label: `预设：${patternText}`,
        disabled: false
      });
    });
  }
  if (loaded) {
    filterOptionCache.get(cacheKey).forEach(item => {
      const baseLabel = item.value || "(空白)";
      options.push({ value: item.value, label: `${baseLabel} (${item.count})`, disabled: false });
    });
  } else {
    if (![FILTER_ALL, FILTER_BLANK, FILTER_NONBLANK].includes(current) && !isPresetGroupFilterValue(current) && current) {
      options.push({ value: current, label: `${current || "(空白)"} (0)`, disabled: false });
    }
    options.push({ value: "__LAZY__", label: "点此加载候选", disabled: true });
  }
  return options.map(item => `<option value="${escapeHtml(item.value)}" ${item.value === current ? "selected" : ""} ${item.disabled ? "disabled" : ""}>${escapeHtml(item.label)}</option>`).join("");
}

function ensureExactOptionsLoaded(columnIndex) {
  if (!headers.length) return;
  const stateKey = getFilterOptionStateKey();
  syncFilterOptionCache(stateKey);
  const cacheKey = getFilterCacheKey(columnIndex, stateKey);
  if (loadedFilterOptionKeys.has(cacheKey) || loadingFilterOptionKeys.has(cacheKey)) return;
  loadingFilterOptionKeys.add(cacheKey);
  setLoadingState(true, `正在构建筛选候选：${headers[columnIndex]}`, "仅首次展开该列时计算一次，请稍候");
  setTimeout(() => {
    getExactOptions(columnIndex, stateKey);
    loadedFilterOptionKeys.add(cacheKey);
    loadingFilterOptionKeys.delete(cacheKey);
    const select = document.getElementById(`header-filter-select-${columnIndex}`);
    if (select) {
      select.innerHTML = buildExactOptionsHtml(columnIndex, stateKey);
      select.value = columnExactFilters[columnIndex] || FILTER_ALL;
    }
    setLoadingState(false);
  }, 0);
}

function getFilterStatus(index) {
  const parts = [];
  const textFilter = normalizeCell(columnTextFilters[index]);
  const exactFilter = columnExactFilters[index] || FILTER_ALL;
  if (textFilter) parts.push(`含“${textFilter}”`);
  if (exactFilter === FILTER_BLANK) parts.push("空白");
  else if (exactFilter === FILTER_NONBLANK) parts.push("非空");
  else if (isPresetGroupFilterValue(exactFilter)) parts.push(`预设“${decodePresetGroupFilter(exactFilter)}”`);
  else if (exactFilter !== FILTER_ALL) parts.push(`等于“${exactFilter}”`);
  return parts.join("，");
}

function renderTable() {
  const table = document.getElementById("wordTable");
  if (!headers.length) {
    table.innerHTML = "";
    document.getElementById("topBtns").style.display = "none";
    renderColumnPanel();
    updateColumnToolBar();
    updateStatBar();
    return;
  }
  syncColumnFilters();
  syncColumnWidths();
  syncVisibleColumns();
  ensureSelectedColumn();
  clampCurrentPage();
  document.getElementById("topBtns").style.display = "";
  const visibleIndices = getVisibleIndices();
  const visibleColumnIndices = getVisibleColumnIndices();
  const stickyConfig = getStickyConfig(visibleColumnIndices);
  const filterOptionStateKey = getFilterOptionStateKey();
  const start = (currentPage - 1) * pageSize;
  const end = Math.min(start + pageSize, visibleIndices.length);
  const colGroupHtml = `
    <colgroup>
      ${visibleColumnIndices.map(idx => `<col id="col-width-${idx}" style="width:${columnWidths[idx]}px;">`).join("")}

        ? ` study-col-2 second-col-emphasis${firstColHugeMode ? " second-col-huge" : ""}`

    const stickyStyle = sticky ? ` style="left:${sticky.left}px;"` : "";
    return `
      <th id="header-cell-${idx}" class="resizable-th${idx === 1 ? " col2-fixed-th" : ""}${idx >= 13 && idx <= 25 ? " compact-fz-th" : ""}${idx >= 5 && idx <= 12 ? " uniform-study-th" : ""}${idx === 6 ? " col-7-purple" : ""}${idx === 8 ? " col-9-purple" : ""}${selectedClass}${studyClass} ${stickyClass}"${stickyStyle} onclick="selectColumn(${idx})">
        <div class="th-inner">
          <span class="th-label">${escapeHtml(header)} ${flag}</span>

          </span>

        <div class="col-resizer" onpointerdown="startResize(${idx}, event)" ondblclick="autoFitColumn(${idx})"></div>
      </th>
    `;
  }).join("");
  const filterHtml = visibleColumnIndices.map(idx => {
    const isWordColumn = idx === 0;
    const isPhoneticColumn = idx === 1;
    const selectValue = columnExactFilters[idx] || FILTER_ALL;
    const optionsHtml = buildExactOptionsHtml(idx, filterOptionStateKey);
    const status = getFilterStatus(idx);
    const sticky = stickyConfig.get(idx);
    const stickyClass = sticky ? `sticky-col filter-cell${sticky.last ? " sticky-divider" : ""}` : "";
    const selectedClass = selectedColumnIndex === idx ? " selected" : "";
    const studyClass = isWordColumn
      ? ` study-col-1 first-col-filter${firstColHugeMode ? " first-col-filter-huge" : ""}`
      : isPhoneticColumn
        ? ` study-col-2 second-col-filter${firstColHugeMode ? " second-col-filter-huge" : ""}`
        : "";
    const stickyStyle = sticky ? ` style="left:${sticky.left}px;"` : "";
    return `
      <th class="resizable-filter-th${idx === 1 ? " col2-fixed-filter" : ""}${idx >= 13 && idx <= 25 ? " compact-fz-filter" : ""}${idx >= 5 && idx <= 12 ? " uniform-study-filter" : ""}${idx === 6 ? " col-7-purple" : ""}${idx === 8 ? " col-9-purple" : ""}${selectedClass}${studyClass} ${stickyClass}"${stickyStyle}>
        <div class="header-filter-box">
          <input class="header-filter-text" value="${escapeHtml(columnTextFilters[idx] || "")}" placeholder="支持空格或关系 + * ?" oninput="setColumnTextFilter(${idx}, this.value)">
          <select id="header-filter-select-${idx}" class="header-filter-select" onfocus="ensureExactOptionsLoaded(${idx})" onpointerdown="ensureExactOptionsLoaded(${idx})" onchange="setColumnExactFilter(${idx}, this.value)" ${selectValue === "__LAZY__" ? "" : ""}>${optionsHtml}</select>
          <div class="filter-status">${escapeHtml(status || "")}</div>
        </div>
      </th>
    `;
  }).join("");
  const rowsHtml = visibleIndices.slice(start, end).map(rowIndex => {
    const row = data[rowIndex];
    const wordKey = getWordKey(row);
    const eliminatedRow = eliminatedWords.has(wordKey);
    const rowClass = eliminatedRow ? "eliminated" : "";
    return `
      <tr class="${rowClass}" data-word-key="${escapeHtml(wordKey)}">
        ${visibleColumnIndices.map(idx => {
          const isWordColumn = idx === 0;
          const isPhoneticColumn = idx === 1;
          const sticky = stickyConfig.get(idx);
          const stickyClass = sticky ? `sticky-col${sticky.last ? " sticky-divider" : ""}` : "";
          const studyClass = isWordColumn
            ? ` study-col-1 first-col-emphasis${firstColHugeMode ? " first-col-huge" : ""}`
            : isPhoneticColumn
              ? ` study-col-2 second-col-emphasis${firstColHugeMode ? " second-col-huge" : ""}`
              : "";
          const stickyStyle = sticky ? ` style="left:${sticky.left}px;${eliminatedRow ? "background:#ffb46a;" : ""}"` : "";
          return `<td class="${idx >= 5 && idx <= 12 ? "uniform-study-td " : ""}${idx === 6 ? "col-7-purple " : ""}${idx === 8 ? "col-9-purple " : ""}${idx >= 13 && idx <= 25 ? "compact-fz-td " : ""}${stickyClass}${studyClass}"${stickyStyle}>${escapeHtml(row[idx])}</td>`;
        }).join("")}
        <td class="action-cell" onclick="toggleEliminate('${encodeURIComponent(wordKey)}', event)" title="${eliminatedRow ? '恢复这个单词' : '消灭这个单词'}"><button class="eliminate-btn" tabindex="-1" aria-hidden="true">${eliminatedRow ? "↺" : "✕"}</button></td>
      </tr>
    `;
  }).join("");
  const emptyHtml = visibleIndices.length
    ? rowsHtml
    : `<tr><td class="empty-row" colspan="${visibleColumnIndices.length + 1}">当前筛选结果为空</td></tr>`;
  table.innerHTML = `
    ${colGroupHtml}
    <thead>
      <tr class="header-row">${headerHtml}<th class="action-header-cell"><div class="th-inner"><span class="th-label">✕</span></div></th></tr>
      <tr class="filter-row">${filterHtml}<th></th></tr>
    </thead>
    <tbody>${emptyHtml}</tbody>
  `;
  renderColumnPanel();
  updateColumnToolBar();
  updateStatBar();
}

function applyEliminatedStateToVisibleRows(wordKey, eliminated) {
  const safeKey = String(wordKey || "").replace(/\/g, "\\").replace(/"/g, '\"');
  document.querySelectorAll(`tr[data-word-key="${safeKey}"]`).forEach(row => {
    row.classList.toggle("eliminated", eliminated);
    row.querySelectorAll('.sticky-col').forEach(cell => {
      cell.style.background = eliminated ? '#ffb46a' : '';
    });
    const actionCell = row.querySelector('.action-cell');
    if (actionCell) {
      actionCell.title = eliminated ? '恢复这个单词' : '消灭这个单词';
      const btn = actionCell.querySelector('.eliminate-btn');
      if (btn) btn.textContent = eliminated ? '↺' : '✕';
    }
  });
}

function fastToggleEliminate(wordKey) {
  const eliminated = eliminatedWords.has(wordKey);
  applyEliminatedStateToVisibleRows(wordKey, eliminated);
  saveProgress();
  updateStatBar();
}

function renderPagination() {
  const indices = getVisibleIndices();
  const totalPages = Math.max(1, Math.ceil(indices.length / pageSize));
  clampCurrentPage();
  let html = "";
  if (currentPage > 1) html += `<button onclick="gotoPage(${currentPage - 1})">&lt;上一页</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === currentPage) {
      html += `<b>${i}</b> `;
    } else if (i <= 3 || i > totalPages - 3 || Math.abs(i - currentPage) <= 1) {
      html += `<button onclick="gotoPage(${i})">${i}</button>`;
    } else if (i === currentPage - 2 || i === currentPage + 2) {
      html += "...";
    }
  }
  if (currentPage < totalPages) html += `<button onclick="gotoPage(${currentPage + 1})">下一页&gt;</button>`;
  document.getElementById("pagination").innerHTML = html;
  saveProgress();
}

function renderAll() {
  renderTable();
  renderPagination();
  updateStatBar();
  setTimeout(updateSlider, 10);
}

function gotoPage(page) {
  currentPage = page;
  renderAll();
}

function toggleEliminate(wordKey, event) {
  event.stopPropagation();
  const decoded = decodeURIComponent(wordKey);
  if (eliminatedWords.has(decoded)) eliminatedWords.delete(decoded);
  else eliminatedWords.add(decoded);
  if (hideEliminated) {
    renderAll();
    saveProgress();
    return;
  }
  fastToggleEliminate(decoded);
}

function toggleHideEliminated() {
  hideEliminated = !hideEliminated;
  document.getElementById("toggleHideBtn").textContent = hideEliminated ? "显示已消灭单词" : "隐藏已消灭单词";
  currentPage = 1;
  renderAll();
}

function setHeaderSort(index, direction) {
  if (headerSort.index === index && headerSort.direction === direction) {
    headerSort = { index: -1, direction: "" };
  } else {
    headerSort = { index, direction };
  }
  document.getElementById("sortSelect").value = "origin";
  currentPage = 1;
  applySorting();
  renderAll();
}

function clearHeaderSort() {
  if (headerSort.index < 0) return;
  headerSort = { index: -1, direction: "" };
  applySorting();
  renderAll();
}

function setColumnTextFilter(index, value) {
  columnTextFilters[index] = value;
  currentPage = 1;
  renderAll();
}

function setColumnExactFilter(index, value) {
  columnExactFilters[index] = value || FILTER_ALL;
  currentPage = 1;
  renderAll();
}

function clearHeaderFilters() {
  columnTextFilters = Array.from({ length: headers.length }, () => "");
  columnExactFilters = Array.from({ length: headers.length }, () => FILTER_ALL);
  currentPage = 1;
  renderAll();
}

function doSearch() {
  globalSearchText = normalizeCell(document.getElementById("searchBox").value);
  currentPage = 1;
  renderAll();
}

function clearSearch() {
  globalSearchText = "";
  document.getElementById("searchBox").value = "";
  currentPage = 1;
  renderAll();
}

function escapeCSV(value) {
  let text = String(value ?? "");
  if (text.includes('"')) text = text.replace(/"/g, '""');
  if (/[",\n]/.test(text)) return `"${text}"`;
  return text;
}

function exportCSV(type) {
  if (!headers.length) return;
  const rows = [headers.map(escapeCSV).join(",")];
  origData.forEach(row => {
    const key = getWordKey(row);
    if (type === "eliminated" && eliminatedWords.has(key)) rows.push(row.map(escapeCSV).join(","));
    if (type === "remaining" && !eliminatedWords.has(key)) rows.push(row.map(escapeCSV).join(","));
  });
  const blob = new Blob([rows.join("\r\n")], { type: "text/csv" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${type === "eliminated" ? "已消灭单词" : "剩余单词"}${currentSheetName ? "_" + currentSheetName : ""}.csv`;
  link.click();
}

function resetAll() {
  if (!headers.length) return;
  hideEliminated = false;
  globalSearchText = "";
  currentPage = 1;
  selectedColumnIndex = -1;
  firstColHugeMode = false;
  studyFocusMode = "all";
  preFocusVisibleColumns = null;
  columnPanelVisible = false;
  clearFilterState();
  clearFilterOptionCache();
  syncColumnWidths(true);
  syncVisibleColumns(true);
  ensureSelectedColumn();
  document.getElementById("toggleHideBtn").textContent = "隐藏已消灭单词";
  document.getElementById("searchBox").value = "";
  document.getElementById("sortSelect").value = "origin";
  renderAll();
}

document.getElementById("sortSelect").addEventListener("change", function() {
  if (!headers.length) return;
  headerSort = { index: -1, direction: "" };
  currentPage = 1;
  applySorting();
  renderAll();
});

function updateSlider() {
  const indices = getVisibleIndices();
  const totalPages = Math.ceil(indices.length / pageSize);
  const slider = document.getElementById("pageSlider");
  const wrap = document.getElementById("pageSliderWrap");
  if (totalPages <= 1) {
    wrap.style.display = "none";
    slider.innerHTML = "";
    return;
  }
  wrap.style.display = "";
  const height = wrap.clientHeight;
  const thumbHeight = Math.max(28, height / totalPages);
  const maxTop = Math.max(height - thumbHeight, 0);
  const top = totalPages === 1 ? 0 : maxTop / (totalPages - 1) * (currentPage - 1);
  slider.innerHTML = `<div class="slider-thumb" id="sliderThumb" style="top:${top}px;height:${thumbHeight}px;">${currentPage}</div>`;
  const thumb = document.getElementById("sliderThumb");
  thumb.onpointerdown = event => {
    activeSliderDrag = {
      startY: event.clientY,
      startPage: currentPage,
      totalPages,
      thumbHeight
    };
    document.body.style.userSelect = "none";
    window.addEventListener("pointermove", handlePointerMove, { passive: true });
    window.addEventListener("pointerup", handlePointerUp, { passive: true });
    window.addEventListener("pointercancel", handlePointerUp, { passive: true });
  };
}

window.addEventListener("beforeunload", () => saveProgress(true));
document.addEventListener("pointerdown", maybeCloseColumnPanel, { passive: true });
window.onresize = () => setTimeout(updateSlider, 200);
</script>
</body>
</html>
