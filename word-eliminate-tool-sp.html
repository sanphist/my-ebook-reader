<script>
let data = [];
let origData = [];
let eliminatedWords = new Set();
let questionedWords = new Set();
let workbookSheets = [];
let headers = [];
let pageSize = 100;
let currentPage = 1;
let fileHash = "";
let fileName = "";
let currentSheetName = "";
let hideEliminated = false;
let globalSearchText = "";
let columnTextFilters = [];
let columnExactFilters = [];
let headerSort = { index: -1, direction: "" };
let columnWidths = [];
let visibleColumns = [];
let selectedColumnIndex = -1;
let firstColHugeMode = false;
let studyFocusMode = "all";
let preFocusVisibleColumns = null;
let activeResize = null;
let activeSliderDrag = null;
let activeHeaderGesture = null;
let headerLongPressTimer = null;
let workbookWorker = null;
let workbookWorkerRequests = new Map();
let workbookWorkerRequestId = 0;
let workerWorkbookReady = false;
let isWorkerBusy = false;
let columnPanelVisible = false;
let filterOptionCache = new Map();
let filterOptionCacheStateKey = "";
let loadedFilterOptionKeys = new Set();
let loadingFilterOptionKeys = new Set();
let saveProgressTimer = null;
let undoStack = [];
let coverMode = "none";
let stickyColumnCount = 3;
let filterInputTimer = null;
let lastStorageError = "";
const PROGRESS_VERSION = 2;
const STORAGE_PREFIX = "eliminate_words_progress_kk_";
const FILTER_ALL = "__ALL__";
const FILTER_BLANK = "__BLANK__";
const FILTER_NONBLANK = "__NONBLANK__";
const MIN_COLUMN_WIDTH = 96;
const FIT_MIN_COLUMN_WIDTH = 68;
const MANUAL_NARROW_COLUMN_WIDTH = 30;
const P_COLUMN_MIN_WIDTH = 16;
const ETYMOLOGY_COLUMN_DEFAULT_WIDTH = 50;

function isPHeaderColumn(index) {
  return /^p/i.test(normalizeCell(headers[index]));
}

function isEtymologyHeaderColumn(index) {
  return /词根|词源/.test(normalizeCell(headers[index]));
}

function getColumnMinWidth(index) {
  if (isPHeaderColumn(index)) return P_COLUMN_MIN_WIDTH;
  if (isEtymologyHeaderColumn(index)) return MANUAL_NARROW_COLUMN_WIDTH;
  if (index >= 5 && index <= 12) return 16;
  if (index === 1) return 36;
  if (index === 2) return 56;
  return MIN_COLUMN_WIDTH;
}

function getColumnFixedWidth(index) {
  // 所有列都允许用户调整；部分学习列只保留较窄的默认值和最小值。
  return null;
}

const PRESET_GROUP_FILTERS = {
  6: [
    "ɑː* ɑ* a* æ*",
    "ɔː* ɔ* ɒ*",
    "ə* ʌ* ɜː* ɝ* ɚ*",
    "ɪ* iː* i*",
    "ʊ* uː* u*",
    "e* ɛ*"
  ],
  8: [
    "ɑː* ɑ* a* æ*",
    "ɔː* ɔ* ɒ*",
    "ə* ʌ* ɜː* ɝ* ɚ*",
    "ɪ* iː* i*",
    "ʊ* uː* u*",
    "e* ɛ*"
  ],
  10: [
    "ɑː* ɑ* a* æ*",
    "ɔː* ɔ* ɒ*",
    "ə* ʌ* ɜː* ɝ* ɚ*",
    "ɪ* iː* i*",
    "ʊ* uː* u*",
    "e* ɛ*"
  ],
  7: [
    "p* b*",
    "t* ɾ* ʔ* d*",
    "k* g*",
    "f* v*",
    "s* z*",
    "θ* ð*",
    "ʃ* ʒ*",
    "m* n* ŋ*",
    "l* r* h* ɹ* ɫ*",
    "j* w*"
  ],
  9: [
    "p* b*",
    "t* ɾ* ʔ* d*",
    "k* g*",
    "f* v*",
    "s* z*",
    "θ* ð*",
    "ʃ* ʒ*",
    "m* n* ŋ*",
    "l* r* h* ɹ* ɫ*",
    "j* w*"
  ]
};

function getPresetGroupFilters(columnIndex) {
  return PRESET_GROUP_FILTERS[columnIndex] || [];
}

function encodePresetGroupFilter(patternText) {
  return "__GROUP__:" + patternText;
}

function decodePresetGroupFilter(value) {
  return String(value || "").startsWith("__GROUP__:") ? String(value).slice("__GROUP__:".length) : "";
}

function isPresetGroupFilterValue(value) {
  return String(value || "").startsWith("__GROUP__:");
}

const ACTION_COLUMN_WIDTH = 100;
const HEADER_LONG_PRESS_MS = 260;
const MAX_STICKY_COLUMN_COUNT = 5;
const FIXED_CORE_COLUMN_WIDTH = 72;
const THIRD_STICKY_COLUMN_WIDTH = 92;
const UNIFORM_STUDY_COLUMN_WIDTH = 16;

function getStorageKey(hashValue = fileHash) {
  return STORAGE_PREFIX + (fileName || "unknown") + "_" + (currentSheetName || "sheet") + "_" + (hashValue || "0");
}

function quickHash(arr) {
  // 按行计算与 JSON.stringify(arr) 相同的指纹，避免大表生成一份巨型临时字符串。
  let h1 = 0x811c9dc5;
  let h2 = 0x9e3779b9;
  let totalLength = 0;
  const consume = text => {
    totalLength += text.length;
    for (let i = 0; i < text.length; i++) {
      const code = text.charCodeAt(i);
      h1 = Math.imul(h1 ^ code, 0x01000193);
      h2 = Math.imul(h2 ^ code, 0x85ebca6b);
    }
  };
  consume("[");
  for (let i = 0; i < arr.length; i++) {
    if (i) consume(",");
    consume(JSON.stringify(arr[i]));
  }
  consume("]");
  return `v${PROGRESS_VERSION}_${(h1 >>> 0).toString(16)}${(h2 >>> 0).toString(16)}_${totalLength}`;
}

function legacyQuickHash(arr) {
  const s = JSON.stringify(arr).slice(0, 4000);
  let hash = 0;
  for (let i = 0; i < s.length; i++) {
    hash = ((hash << 5) - hash) + s.charCodeAt(i);
    hash |= 0;
  }
  return hash + "_" + (arr.length || 0);
}

function safeStorageGet(key) {
  try { return localStorage.getItem(key); }
  catch (error) { lastStorageError = error.message || "浏览器存储不可用"; return null; }
}

function safeStorageSet(key, value) {
  try { localStorage.setItem(key, value); lastStorageError = ""; return true; }
  catch (error) {
    lastStorageError = error.message || "浏览器存储空间不足";
    document.getElementById("fileNotice").textContent = `自动保存失败：${lastStorageError}`;
    return false;
  }
}

function safeStorageRemove(key) {
  try { localStorage.removeItem(key); return true; }
  catch (error) { lastStorageError = error.message || "无法清除浏览器存储"; return false; }
}

function normalizeImportedStatus(items) {
  const values = Array.isArray(items) ? items.map(value => String(value)) : [];
  const rowIds = new Set(origData.map(getWordKey));
  if (values.every(value => value.startsWith("row:"))) {
    return new Set(values.filter(value => rowIds.has(value)));
  }
  const legacyWords = new Set(values.map(value => normalizeCell(value).toLowerCase()));
  return new Set(origData.filter(row => legacyWords.has(getWordValue(row).toLowerCase())).map(getWordKey));
}
function normalizeCell(value) {
  if (value == null) return "";
  return String(value).trim();
}

function prepareRows(rows) {
  const safeRows = Array.isArray(rows) ? rows.filter(row => Array.isArray(row)) : [];
  const width = safeRows.reduce((max, row) => Math.max(max, row.length), 0);
  if (!width || !safeRows.length) return { headers: [], rows: [] };
  const normalizedRows = safeRows.map(row => Array.from({ length: width }, (_, idx) => normalizeCell(row[idx])));
  const headerRow = normalizedRows[0].map((value, idx) => value || `列${idx + 1}`);
  const bodyRows = normalizedRows.slice(1).map((row, index) => {
    row._rowId = `row:${index + 2}`;
    return row;
  }).filter(row => row.some(cell => cell !== ""));
  return { headers: headerRow, rows: bodyRows };
}

function cloneRow(row) {
  const cloned = row.slice();
  cloned._rowId = row._rowId;
  return cloned;
}

function findHeaderAlias(aliases, fallback) {
  const normalizedAliases = aliases.map(alias => normalizeCell(alias).toLowerCase());
  const idx = headers.findIndex(header => normalizedAliases.includes(normalizeCell(header).toLowerCase()));
  return idx >= 0 ? idx : Math.min(fallback, Math.max(headers.length - 1, 0));
}

function getWordColumnIndex() {
  return findHeaderAlias(["单词", "word"], 0);
}

function getPhoneticColumnIndex() {
  return findHeaderAlias(["ipa", "音标"], 1);
}

function getMeaningColumnIndex() {
  const translationIndex = headers.findIndex(header => normalizeCell(header).toLowerCase().includes("翻译"));
  return findHeaderAlias(["释义", "解释", "中文翻译"], translationIndex >= 0 ? translationIndex : 2);
}

function getWordKey(row) {
  return row && row._rowId ? row._rowId : `legacy:${normalizeCell(row && row[getWordColumnIndex()]).toLowerCase()}`;
}

function getWordValue(row) {
  return normalizeCell(row && row[getWordColumnIndex()]);
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function isNumericValue(value) {
  if (value === "") return false;
  return /^-?\d+(?:\.\d+)?$/.test(value.replace(/,/g, ""));
}

function compareValues(a, b) {
  const av = normalizeCell(a);
  const bv = normalizeCell(b);
  if (av === bv) return 0;
  if (av === "") return 1;
  if (bv === "") return -1;
  if (isNumericValue(av) && isNumericValue(bv)) {
    return Number(av.replace(/,/g, "")) - Number(bv.replace(/,/g, ""));
  }
  return av.localeCompare(bv, "zh-Hans-CN", { numeric: true, sensitivity: "base" });
}

function escapeWildcardSource(text) {
  return normalizeCell(text).replace(/[-/\\^$+.()|[\]{}]/g, '\\$&');
}

function buildWildcardRegExp(keyword) {
  let pattern = normalizeCell(keyword);
  if (!pattern) return null;
  const hasWildcard = /[*?]/.test(pattern);
  pattern = escapeWildcardSource(pattern);
  pattern = pattern.replace(/\*/g, ".*").replace(/\?/g, ".");
  return new RegExp(hasWildcard ? "^" + pattern + "$" : pattern, "i");
}

function buildWildcardRegExpList(text) {
  const tokens = normalizeCell(text).split(/\s+/).filter(Boolean);
  return tokens.map(token => buildWildcardRegExp(token)).filter(Boolean);
}

function matchesWildcardList(value, patternText) {
  const regs = buildWildcardRegExpList(patternText);
  if (!regs.length) return true;
  const cell = normalizeCell(value);
  return regs.some(reg => reg.test(cell));
}
function syncColumnFilters() {
  if (columnTextFilters.length !== headers.length) {
    columnTextFilters = Array.from({ length: headers.length }, (_, idx) => columnTextFilters[idx] || "");
  }
  if (columnExactFilters.length !== headers.length) {
    columnExactFilters = Array.from({ length: headers.length }, (_, idx) => columnExactFilters[idx] || FILTER_ALL);
  }
}

function clearFilterState() {
  columnTextFilters = Array.from({ length: headers.length }, () => "");
  columnExactFilters = Array.from({ length: headers.length }, () => FILTER_ALL);
  headerSort = { index: -1, direction: "" };
}

function clearFilterOptionCache() {
  filterOptionCache.clear();
  filterOptionCacheStateKey = "";
  loadedFilterOptionKeys.clear();
  loadingFilterOptionKeys.clear();
}

function getFilterOptionStateKey() {
  return JSON.stringify({
    sheet: currentSheetName,
    hash: fileHash,
    search: normalizeCell(globalSearchText).toLowerCase(),
    hideEliminated,
    eliminated: hideEliminated ? Array.from(eliminatedWords).sort() : [],
    textFilters: columnTextFilters.map(value => normalizeCell(value).toLowerCase()),
    exactFilters: columnExactFilters.slice(),
    visibleColumns: visibleColumns.map(value => value !== false)
  });
}

function syncFilterOptionCache(stateKey) {
  if (filterOptionCacheStateKey !== stateKey) {
    filterOptionCacheStateKey = stateKey;
    filterOptionCache.clear();
    loadedFilterOptionKeys.clear();
    loadingFilterOptionKeys.clear();
  }
}

function getFilterCacheKey(columnIndex, stateKey) {
  return `${columnIndex}|${stateKey}`;
}

function syncVisibleColumns(forceReset = false) {
  if (forceReset || visibleColumns.length !== headers.length) {
    visibleColumns = headers.map((_, index) => forceReset ? true : visibleColumns[index] !== false);
  }
}

function estimateColumnWidth(index) {
  const headerLength = normalizeCell(headers[index]).length;
  const sampleRows = origData.slice(0, 40);
  let maxLength = headerLength;
  for (const row of sampleRows) {
    maxLength = Math.max(maxLength, normalizeCell(row[index]).length);
  }
  const baseWidth = Math.min(560, Math.max(MIN_COLUMN_WIDTH, maxLength * 18 + 36));
  if (isPHeaderColumn(index)) return P_COLUMN_MIN_WIDTH;
  if (isEtymologyHeaderColumn(index)) return ETYMOLOGY_COLUMN_DEFAULT_WIDTH;
  if (index === 0 || index === 1) return FIXED_CORE_COLUMN_WIDTH;
  if (index === 2) return THIRD_STICKY_COLUMN_WIDTH;
  if (index === 4) return baseWidth + 24;
  if (index >= 5 && index <= 12) return UNIFORM_STUDY_COLUMN_WIDTH;
  return baseWidth;
}

function syncColumnWidths(forceReset = false) {
  if (forceReset || columnWidths.length !== headers.length) {
    columnWidths = headers.map((_, index) => {
      const existing = columnWidths[index];
      const fixed = getColumnFixedWidth(index);
      if (fixed != null) return fixed;
      const minWidth = getColumnMinWidth(index);
      return typeof existing === "number" && existing >= minWidth ? existing : estimateColumnWidth(index);
    });
  }
}

function fitColumnWidthsToViewport() {
  if (!headers.length) return;
  const wrap = document.getElementById("wordTable")?.parentElement;
  const visibleIndices = getVisibleColumnIndices();
  if (!wrap || !visibleIndices.length) return;
  const availableWidth = Math.max(wrap.clientWidth - ACTION_COLUMN_WIDTH - 12, 0);
  if (!availableWidth) return;
  const fixedIndices = visibleIndices.filter(index => getColumnFixedWidth(index) != null);
  const flexIndices = visibleIndices.filter(index => getColumnFixedWidth(index) == null);
  let usedWidth = 0;
  fixedIndices.forEach(index => {
    const fixed = getColumnFixedWidth(index);
    columnWidths[index] = fixed;
    usedWidth += fixed;
  });
  if (!flexIndices.length) return;
  const remainingWidth = Math.max(availableWidth - usedWidth, 0);
  const sourceWidths = flexIndices.map(index => Math.max(FIT_MIN_COLUMN_WIDTH, columnWidths[index] || estimateColumnWidth(index)));
  const totalWidth = sourceWidths.reduce((sum, width) => sum + width, 0);
  if (!totalWidth) return;
  const scaledWidths = totalWidth <= remainingWidth
    ? sourceWidths.map(width => width * (remainingWidth / totalWidth))
    : sourceWidths.map(width => Math.max(FIT_MIN_COLUMN_WIDTH, width * (remainingWidth / totalWidth)));
  let roundedTotal = 0;
  scaledWidths.forEach((width, position) => {
    const rounded = position === scaledWidths.length - 1
      ? Math.max(FIT_MIN_COLUMN_WIDTH, Math.round(remainingWidth - roundedTotal))
      : Math.max(FIT_MIN_COLUMN_WIDTH, Math.round(width));
    columnWidths[flexIndices[position]] = rounded;
    roundedTotal += rounded;
  });
}


function getVisibleColumnIndices() {
  syncVisibleColumns();
  const indices = [];
  for (let i = 0; i < headers.length; i++) {
    if (visibleColumns[i] !== false) indices.push(i);
  }
  return indices;
}

function ensureSelectedColumn() {
  const visibleIndices = getVisibleColumnIndices();
  if (!visibleIndices.length) {
    selectedColumnIndex = -1;
    return;
  }
  if (!visibleIndices.includes(selectedColumnIndex)) {
    selectedColumnIndex = visibleIndices[0];
  }
}

function getStickyConfig(visibleIndices) {
  const stickyMap = new Map();
  let left = 0;
  const lockedIndices = visibleIndices.slice(0, stickyColumnCount);
  lockedIndices.forEach((columnIndex, order) => {
    stickyMap.set(columnIndex, { left, last: order === lockedIndices.length - 1 });
    left += columnWidths[columnIndex];
  });
  return stickyMap;
}

function syncStickyOffsetsFromLayout() {
  const table = document.getElementById("wordTable");
  if (!table || !headers.length) return;
  const lockedIndices = getVisibleColumnIndices().slice(0, stickyColumnCount);
  let left = 0;
  lockedIndices.forEach(columnIndex => {
    table.querySelectorAll(`[data-column-index="${columnIndex}"]`).forEach(cell => {
      cell.style.left = `${left}px`;
    });
    const headerCell = document.getElementById(`header-cell-${columnIndex}`);
    const renderedWidth = headerCell ? headerCell.getBoundingClientRect().width : 0;
    left += renderedWidth > 0 ? renderedWidth : (columnWidths[columnIndex] || 0);
  });
}

function setLoadingState(loading, text = "") {

function getSheetCellDisplayValue(sheet, rowIndex, colIndex) {
  const address = XLSX.utils.encode_cell({ r: rowIndex, c: colIndex });
  const cell = sheet[address];
  if (!cell) return "";
  if (cell.w != null && cell.w !== "") return normalizeCell(cell.w);
  if (cell.v == null) return "";
  return normalizeCell(cell.v);
}

function sheetToGrid(sheet) {
  const ref = sheet && sheet['!ref'];
  if (!ref) return [];
  const range = XLSX.utils.decode_range(ref);
  const rows = [];
  for (let r = range.s.r; r <= range.e.r; r++) {
    const row = [];
    for (let c = range.s.c; c <= range.e.c; c++) {
      row.push(getSheetCellDisplayValue(sheet, r, c));
    }
    rows.push(row);
  }
  return rows;
}

function expandMergedCells(sheet, rows) {
  const merges = Array.isArray(sheet && sheet["!merges"]) ? sheet["!merges"] : [];
  const cloned = rows.map(row => Array.isArray(row) ? row.slice() : []);
  merges.forEach(range => {
    if (!range || !range.s || !range.e) return;
    const startRow = range.s.r || 0;
    const endRow = range.e.r || 0;
    const startCol = range.s.c || 0;
    const endCol = range.e.c || 0;
    const topLeft = (((cloned[startRow] || [])[startCol]) ?? "");
    for (let r = startRow; r <= endRow; r++) {
      if (!cloned[r]) cloned[r] = [];
      for (let c = startCol; c <= endCol; c++) {
        if (cloned[r][c] === undefined || cloned[r][c] === "") cloned[r][c] = topLeft;
      }
    }
  });
  return cloned;
}

function parseWorkbookToCachedSheets(payload, fileType) {
  const workbook = XLSX.read(payload, {
    type: fileType === "csv-text" ? "string" : "array",
    cellText: true,
    cellFormula: true,
    cellDates: true
  });
  return workbook.SheetNames.map(name => {
    const sheet = workbook.Sheets[name];
    const rows = sheetToGrid(sheet);
    return {
      name,
      rows: expandMergedCells(sheet, rows)
    };
  });
}

function applyCachedWorkbookSheets() {
  const firstSheet = workbookSheets[0] || { name: "Sheet1", rows: [] };
  const prepared = prepareRows(firstSheet.rows || []);
  populateSheetSelect();
  applySheetPayload(firstSheet.name, prepared.headers, prepared.rows, true);
}

function getWorkbookWorker() {
  if (workbookWorker) return workbookWorker;
  if (typeof Worker === "undefined") return null;
  const workerSource = `
    let workbook = null;

    function getEffectiveRange(sheet) {
      if (!sheet || !sheet["!ref"]) return null;
      const range = XLSX.utils.decode_range(sheet["!ref"]);
      const denseRows = Array.isArray(sheet) ? sheet : (Array.isArray(sheet["!data"]) ? sheet["!data"] : null);
      if (denseRows) {
        range.e.r = Math.min(range.e.r, Math.max(denseRows.length - 1, range.s.r));
        let maxColumn = range.s.c;
        for (let r = range.s.r; r <= range.e.r; r++) {
          const row = denseRows[r];
          if (Array.isArray(row) && row.length) maxColumn = Math.max(maxColumn, row.length - 1);
        }
        range.e.c = Math.min(range.e.c, maxColumn);
      }
      return range;
    }

    function makeSheetPayload(name) {
      const sheet = workbook && workbook.Sheets[name];
      const range = getEffectiveRange(sheet);
      if (!sheet || !range) return { name, rows: [] };
      const rows = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        raw: false,
        defval: "",
        blankrows: true,
        range
      });
      const merges = Array.isArray(sheet["!merges"]) ? sheet["!merges"] : [];
      merges.forEach(merge => {
        const startRow = merge.s.r - range.s.r;
        const endRow = merge.e.r - range.s.r;
        const startCol = merge.s.c - range.s.c;
        const endCol = merge.e.c - range.s.c;
        if (startRow < 0 || startCol < 0 || startRow >= rows.length) return;
        const topLeft = ((rows[startRow] || [])[startCol]) ?? "";
        for (let r = startRow; r <= Math.min(endRow, rows.length - 1); r++) {
          if (!rows[r]) rows[r] = [];
          for (let c = startCol; c <= endCol; c++) {
            if (rows[r][c] == null || rows[r][c] === "") rows[r][c] = topLeft;
          }
        }
      });
      return { name, rows };
    }

    self.onmessage = event => {
      const message = event.data || {};
      try {
        if (message.action === "load") {
          if (typeof XLSX === "undefined") importScripts("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js");
          const type = message.fileType === "csv-text" ? "string" : "array";
          workbook = XLSX.read(message.payload, {
            type,
            dense: true,
            cellText: true,
            cellFormula: false,
            cellDates: false,
            cellStyles: false,
            cellNF: false,
            cellHTML: false,
            bookDeps: false,
            bookVBA: false
          });
          const sheetNames = workbook.SheetNames.slice();
          const sheet = makeSheetPayload(sheetNames[0] || "Sheet1");
          self.postMessage({ requestId: message.requestId, ok: true, sheetNames, sheet });
          return;
        }
        if (message.action === "sheet") {
          if (!workbook) throw new Error("工作簿尚未完成解析");
          self.postMessage({ requestId: message.requestId, ok: true, sheet: makeSheetPayload(message.name) });
        }
      } catch (error) {
        self.postMessage({ requestId: message.requestId, ok: false, error: error && error.message ? error.message : String(error) });
      }
    };
  `;
  const url = URL.createObjectURL(new Blob([workerSource], { type: "text/javascript" }));
  workbookWorker = new Worker(url);
  URL.revokeObjectURL(url);
  workbookWorker.onmessage = event => {
    const message = event.data || {};
    const pending = workbookWorkerRequests.get(message.requestId);
    if (!pending) return;
    workbookWorkerRequests.delete(message.requestId);
    if (message.ok) pending.resolve(message);
    else pending.reject(new Error(message.error || "后台解析失败"));
  };
  workbookWorker.onerror = event => {
    const error = new Error(event.message || "后台解析失败");
    workbookWorkerRequests.forEach(pending => pending.reject(error));
    workbookWorkerRequests.clear();
    workerWorkbookReady = false;
    workbookWorker.terminate();
    workbookWorker = null;
  };
  return workbookWorker;
}

function requestWorkbookWorker(message, transfer = []) {
  const worker = getWorkbookWorker();
  if (!worker) return Promise.reject(new Error("当前浏览器不支持后台解析"));
  const requestId = ++workbookWorkerRequestId;
  return new Promise((resolve, reject) => {
    workbookWorkerRequests.set(requestId, { resolve, reject });
    worker.postMessage({ ...message, requestId }, transfer);
  });
}

function parsePayloadAsync(payload, fileType) {
  const worker = getWorkbookWorker();
  if (!worker) return Promise.resolve(parseWorkbookToCachedSheets(payload, fileType));
  workerWorkbookReady = false;
  const transfer = payload instanceof ArrayBuffer ? [payload] : [];
  return requestWorkbookWorker({ action: "load", payload, fileType }, transfer).then(result => {
    workerWorkbookReady = true;
    const firstSheet = result.sheet || { name: (result.sheetNames || [])[0] || "Sheet1", rows: [] };
    return (result.sheetNames || [firstSheet.name]).map(name => ({
      name,
      rows: name === firstSheet.name ? firstSheet.rows : null
    }));
  });
}

function requestWorkbookSheet(name) {
  return requestWorkbookWorker({ action: "sheet", name }).then(result => result.sheet || { name, rows: [] });
}

function applyRenderedColumnWidth(index) {
  const col = document.getElementById(`col-width-${index}`);
  if (col) col.style.width = `${columnWidths[index]}px`;
}

function applyRenderedColumnWidths(indices) {
  indices.forEach(index => applyRenderedColumnWidth(index));
}

function clearHeaderGesture() {
  if (headerLongPressTimer) {
    clearTimeout(headerLongPressTimer);
    headerLongPressTimer = null;
  }
  if (activeHeaderGesture) {
    const th = document.getElementById(`header-cell-${activeHeaderGesture.index}`);
    if (th) th.classList.remove("touch-resize-active");
  }
  activeHeaderGesture = null;
}

function getResizeTargetIndices(index) {
  const visibleIndices = getVisibleColumnIndices();
  const startPosition = visibleIndices.indexOf(index);
  if (startPosition < 0) return [index];
  return visibleIndices.slice(startPosition);
}

function shouldIgnoreHeaderGesture(event) {
  const target = event.target;
  if (!target || !target.closest) return false;
  return !!target.closest(".col-resizer, .sort-btn, .small-btn, input, select, button");
}

function beginHeaderTouchResize(index, event) {
  if (!headers.length || event.pointerType !== "touch" || shouldIgnoreHeaderGesture(event)) return;
  clearHeaderGesture();
  activeHeaderGesture = {
    index,
    pointerId: event.pointerId,
    startX: event.clientX,
    startY: event.clientY,
    activated: false
  };
  window.addEventListener("pointermove", handlePointerMove, { passive: false });
  window.addEventListener("pointerup", handlePointerUp, { passive: false });
  window.addEventListener("pointercancel", handlePointerUp, { passive: false });
  headerLongPressTimer = setTimeout(() => {
    if (!activeHeaderGesture || activeHeaderGesture.pointerId !== event.pointerId) return;
    activeHeaderGesture.activated = true;
    const th = document.getElementById(`header-cell-${index}`);
    if (th) th.classList.add("touch-resize-active");
    startResize(index, {
      clientX: activeHeaderGesture.startX,
      pointerType: "touch",
      preventDefault() {},
      stopPropagation() {}
    });
  }, HEADER_LONG_PRESS_MS);
}

function startResize(index, event) {
  if (!headers.length) return;
  syncColumnWidths();
  selectedColumnIndex = index;
  updateColumnToolBar();
  activeResize = {
    index,
    startX: event.clientX,
    startWidth: columnWidths[index],
    pointerType: event.pointerType || "mouse"
  };
  document.body.style.userSelect = "none";
  document.body.style.cursor = "col-resize";
  const th = document.getElementById(`header-cell-${index}`);
  if (th) th.classList.add("resizing");
  window.addEventListener("pointermove", handlePointerMove, { passive: false });
  window.addEventListener("pointerup", handlePointerUp, { passive: false });
  window.addEventListener("pointercancel", handlePointerUp, { passive: false });
  if (event.currentTarget && event.currentTarget.setPointerCapture && event.pointerId != null) {
    try { event.currentTarget.setPointerCapture(event.pointerId); } catch {}
  }
  event.preventDefault();
  event.stopPropagation();
}

function autoFitColumn(index) {
  syncColumnWidths();
  columnWidths[index] = estimateColumnWidth(index);
  renderTable();
  renderPagination();
  updateStatBar();
}

function resizeColumnsFromGesture(deltaX) {
  if (!activeResize) return;
  const minWidth = getColumnMinWidth(activeResize.index);
  columnWidths[activeResize.index] = Math.max(minWidth, Math.round(activeResize.startWidth + deltaX));
  applyRenderedColumnWidth(activeResize.index);
  syncStickyOffsetsFromLayout();
}

function selectColumn(index) {
  if (index < 0 || index >= headers.length || visibleColumns[index] === false) return;
  selectedColumnIndex = index;
  updateColumnToolBar();
  renderTable();
}

function adjustSelectedColumnWidth(delta) {
  ensureSelectedColumn();
  if (selectedColumnIndex < 0) return;
  syncColumnWidths();
  const fixed = getColumnFixedWidth(selectedColumnIndex);
  if (fixed != null) { columnWidths[selectedColumnIndex] = fixed; } else {
    columnWidths[selectedColumnIndex] = Math.max(getColumnMinWidth(selectedColumnIndex), columnWidths[selectedColumnIndex] + delta);
  }
  renderTable();
  renderPagination();
}

function autoFitSelectedColumn() {
  ensureSelectedColumn();
  if (selectedColumnIndex < 0) return;
  autoFitColumn(selectedColumnIndex);
}

function setSelectedColumnNarrowest() {
  ensureSelectedColumn();
  if (selectedColumnIndex < 0) return;
  syncColumnWidths();
  const fixed = getColumnFixedWidth(selectedColumnIndex);
  columnWidths[selectedColumnIndex] = fixed != null ? fixed : (isPHeaderColumn(selectedColumnIndex) ? P_COLUMN_MIN_WIDTH : MANUAL_NARROW_COLUMN_WIDTH);
  saveProgress();
  renderTable();
  renderPagination();
}

function resetAllColumnWidths() {
  syncColumnWidths(true);
  renderTable();
  renderPagination();
}

function toggleColumnPanel() {
  if (!headers.length) return;
  columnPanelVisible = !columnPanelVisible;
  renderColumnPanel();
  updateColumnToolBar();
}

function closeColumnPanel() {

  columnPanelVisible = false;
  renderColumnPanel();

}

function maybeCloseColumnPanel(event) {
  if (!columnPanelVisible) return;
  const target = event.target;
  if (!target || !target.closest) return;
  if (target.closest("#columnPopover") || target.closest("#toggleColumnPanelBtn")) return;
  closeColumnPanel();
}

function toggleColumnVisibility(index, checked) {
  syncVisibleColumns();
  const visibleCount = getVisibleColumnIndices().length;
  if (!checked && visibleCount <= 1) {
    renderColumnPanel();
    return;
  }
  studyFocusMode = "all";
  preFocusVisibleColumns = null;
  visibleColumns[index] = checked;
  if (!checked) {
    columnTextFilters[index] = "";
    columnExactFilters[index] = FILTER_ALL;
  }
  ensureSelectedColumn();
  renderAll();
}

function showAllColumns() {
  syncVisibleColumns(true);
  studyFocusMode = "all";
  preFocusVisibleColumns = null;
  ensureSelectedColumn();
  renderAll();
}

function showOnlyCoreColumns() {
  syncVisibleColumns(true);
  visibleColumns = headers.map((_, index) => index < 3);
  studyFocusMode = "all";
  preFocusVisibleColumns = null;
  ensureSelectedColumn();
  renderAll();
}

function setStickyColumnCount(value) {
  stickyColumnCount = Math.min(MAX_STICKY_COLUMN_COUNT, Math.max(1, Number(value) || 3));
  const select = document.getElementById("stickyColumnCountSelect");
  if (select) select.value = String(stickyColumnCount);
  saveProgress();
  renderAll();
}

function toggleFirstColHugeMode() {
  firstColHugeMode = !firstColHugeMode;
  saveProgress();
  renderAll();
}

function applyStudyFocusMode(mode) {
  syncVisibleColumns();
  if (mode === "all") {
    if (preFocusVisibleColumns && preFocusVisibleColumns.length === headers.length) {
      visibleColumns = preFocusVisibleColumns.slice();
    } else {
      visibleColumns = headers.map((_, index) => visibleColumns[index] !== false);
    }
    studyFocusMode = "all";
    preFocusVisibleColumns = null;
  } else {
    if (studyFocusMode === "all") preFocusVisibleColumns = visibleColumns.slice();
    visibleColumns = headers.map((_, index) => {
      if (mode === "word") return index === getWordColumnIndex();
      if (mode === "phonetic") return index === getPhoneticColumnIndex();
      if (mode === "meaning") return index === getMeaningColumnIndex();
      return false;
    });
    studyFocusMode = mode;
  }
  ensureSelectedColumn();
  saveProgress();
  renderAll();
}

function showWordFocusMode() {
  if (!headers[getWordColumnIndex()]) return;
  applyStudyFocusMode("word");
}

function showPhoneticFocusMode() {
  if (!headers[getPhoneticColumnIndex()]) return;
  applyStudyFocusMode("phonetic");
}

function showMeaningFocusMode() {
  if (!headers[getMeaningColumnIndex()]) return;
  applyStudyFocusMode("meaning");
}

function exitStudyFocusMode() {
  if (studyFocusMode === "all") return;
  applyStudyFocusMode("all");
}

function applySheetPayload(sheetName, nextHeaders, nextRows, resetSheetSelect) {
  currentSheetName = sheetName || "";
  headers = Array.isArray(nextHeaders) ? nextHeaders.slice() : [];
  // prepareRows 已生成独立且只读的行；排序只复制行引用，避免大表重复占用内存。
  origData = Array.isArray(nextRows) ? nextRows : [];
  data = origData.slice();
  fileHash = quickHash([currentSheetName, ...origData]);
  eliminatedWords = new Set();
  resetViewState();
  clearFilterOptionCache();
  const restored = tryRestore();
  syncVisibleColumns();
  ensureSelectedColumn();
  applySorting();
  if (resetSheetSelect) populateSheetSelect();
  const sheetSelect = document.getElementById("sheetSelect");
  if (sheetSelect && currentSheetName) sheetSelect.value = currentSheetName;
  document.getElementById("topBtns").style.display = headers.length ? "" : "none";
  if (!restored) document.getElementById("fileNotice").textContent = currentSheetName ? `已加载工作表：${currentSheetName}` : "";
  document.getElementById("pageSizeSelect").value = String(pageSize);
  applyCoverModeUI();
  updateUndoButton();
  setLoadingState(false, currentSheetName ? `已加载工作表：${currentSheetName}` : "");
  renderAll();
}

function handlePointerMove(event) {
  if (activeHeaderGesture && event.pointerId === activeHeaderGesture.pointerId && !activeHeaderGesture.activated) {
    const moveX = Math.abs(event.clientX - activeHeaderGesture.startX);
    const moveY = Math.abs(event.clientY - activeHeaderGesture.startY);
    if (moveX > 12 || moveY > 12) clearHeaderGesture();
  }
  if (activeResize) {
    if (event.cancelable) event.preventDefault();
    resizeColumnsFromGesture(event.clientX - activeResize.startX);
    return;
  }
  if (!activeSliderDrag) return;
  const wrap = document.getElementById("pageSliderWrap");
  const totalPages = Math.max(activeSliderDrag.totalPages, 1);
  const track = Math.max(wrap.clientHeight - activeSliderDrag.thumbHeight, 1);
  const step = totalPages > 1 ? track / (totalPages - 1) : track;
  const movedPages = Math.round((event.clientY - activeSliderDrag.startY) / step);
  const nextPage = Math.min(totalPages, Math.max(1, activeSliderDrag.startPage + movedPages));
  if (nextPage !== currentPage) {
    currentPage = nextPage;
    renderTable();
    renderPagination();
  }
}

function handlePointerUp() {
  if (activeResize) {
    const th = document.getElementById(`header-cell-${activeResize.index}`);
    if (th) th.classList.remove("resizing");
    activeResize = null;
    syncStickyOffsetsFromLayout();
    saveProgress();
    updateColumnToolBar();
  }
  clearHeaderGesture();
  activeSliderDrag = null;
  document.body.style.userSelect = "";
  document.body.style.cursor = "";
  window.removeEventListener("pointermove", handlePointerMove);
  window.removeEventListener("pointerup", handlePointerUp);
  window.removeEventListener("pointercancel", handlePointerUp);
}

function updateStatBar() {
  const statBar = document.getElementById("statBar");
  if (!headers.length) {
    statBar.textContent = "";
    return;
  }
  const visibleCount = getVisibleIndices().length;
  const total = origData.length;
  const eliminatedCount = eliminatedWords.size;
  const questionedCount = questionedWords.size;
  const unprocessedCount = Math.max(total - eliminatedCount - questionedCount, 0);
  const filterCount = columnTextFilters.filter(Boolean).length + columnExactFilters.filter(value => value && value !== FILTER_ALL).length;
  const sortText = headerSort.index >= 0
    ? `表头排序：${headers[headerSort.index]} ${headerSort.direction === "asc" ? "↑" : "↓"}`
    : `顶部排序：${document.getElementById("sortSelect").selectedOptions[0].text}`;
  const searchText = globalSearchText ? ` | 关键词：${globalSearchText}` : "";
  const filterText = filterCount ? ` | 表头筛选：${filterCount} 项` : "";
  statBar.textContent = `叉叉：${eliminatedCount} 条 | 问号：${questionedCount} 条 | 未处理：${unprocessedCount} 条 | 总计：${total} 条 | 当前显示：${visibleCount} 条 | 每页：${pageSize} 条 | ${sortText}${searchText}${filterText}`;
}

function tryRestore() {
  let raw = safeStorageGet(getStorageKey());
  let restoredLegacy = false;
  if (!raw && origData.length <= 5000) {
    // 仅为较小的旧进度计算旧版哈希；大表跳过巨型 JSON 临时副本。
    const legacyHash = legacyQuickHash([currentSheetName, ...origData]);
    raw = safeStorageGet(getStorageKey(legacyHash));
    restoredLegacy = !!raw;
  }
  let obj = null;
  try { obj = raw ? JSON.parse(raw) : null; } catch { obj = null; }
  const compatible = obj && (obj.hash === fileHash || restoredLegacy);
  if (compatible) {
    eliminatedWords = normalizeImportedStatus(obj.eliminatedWords);
    questionedWords = normalizeImportedStatus(obj.questionedWords || []);
    questionedWords.forEach(id => eliminatedWords.delete(id));
    currentPage = Math.max(1, Number(obj.currentPage) || 1);
    pageSize = [50, 100, 200, 300].includes(Number(obj.pageSize)) ? Number(obj.pageSize) : 100;
    if (Array.isArray(obj.columnWidths) && obj.columnWidths.length === headers.length) {
      columnWidths = obj.columnWidths.map((value, index) => { const fixed = getColumnFixedWidth(index); return fixed != null ? fixed : Math.max(isPHeaderColumn(index) ? P_COLUMN_MIN_WIDTH : MANUAL_NARROW_COLUMN_WIDTH, Number(value) || getColumnMinWidth(index)); });
    }
    if (Array.isArray(obj.visibleColumns) && obj.visibleColumns.length === headers.length) {
      visibleColumns = obj.visibleColumns.map(value => value !== false);
    }
    firstColHugeMode = obj.firstColHugeMode === true;
    studyFocusMode = typeof obj.studyFocusMode === "string" ? obj.studyFocusMode : "all";
    coverMode = ["word", "phonetic", "meaning"].includes(obj.coverMode) ? obj.coverMode : "none";
    stickyColumnCount = [1, 2, 3, 4, 5].includes(Number(obj.stickyColumnCount)) ? Number(obj.stickyColumnCount) : 3;
    document.getElementById("fileNotice").textContent = `已恢复 ${eliminatedWords.size + questionedWords.size} 条进度（叉叉 ${eliminatedWords.size}，问号 ${questionedWords.size}）${currentSheetName ? "：" + currentSheetName : ""}`;
    if (restoredLegacy) saveProgress(true);
    return true;
  }
  firstColHugeMode = false;
  studyFocusMode = "all";
  coverMode = "none";
  stickyColumnCount = 3;
  document.getElementById("fileNotice").textContent = currentSheetName ? `已加载工作表：${currentSheetName}` : "";
  return false;
}

function persistProgressNow() {
  if (!headers.length) return false;
  return safeStorageSet(getStorageKey(), JSON.stringify({
    version: PROGRESS_VERSION,
    hash: fileHash,
    fileName,
    sheetName: currentSheetName,
    updatedAt: new Date().toISOString(),
    eliminatedWords: Array.from(eliminatedWords),
    questionedWords: Array.from(questionedWords),
    currentPage,
    pageSize,
    columnWidths,
    visibleColumns,
    firstColHugeMode,
    studyFocusMode,
    coverMode,
    stickyColumnCount
  }));
}

function saveProgress(immediate = false) {
  if (saveProgressTimer) {
    clearTimeout(saveProgressTimer);
    saveProgressTimer = null;
  }
  if (immediate) {
    persistProgressNow();
    return;
  }
  saveProgressTimer = setTimeout(() => {
    saveProgressTimer = null;
    persistProgressNow();
  }, 120);
}

function exportProgress() {
  if (!headers.length) return alert("未加载词表");
  const payload = {
    version: PROGRESS_VERSION,
    hash: fileHash,
    fileName,
    sheetName: currentSheetName,
    updatedAt: new Date().toISOString(),
    eliminatedWords: Array.from(eliminatedWords),
    questionedWords: Array.from(questionedWords),
    pageSize,
    columnWidths,
    visibleColumns,
    firstColHugeMode,
    studyFocusMode,
    coverMode,
    stickyColumnCount
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
  const link = document.createElement("a");
  const date = new Date().toISOString().slice(0, 10);
  const baseName = fileName.replace(/\.[^.]+$/, "");
  const sheetSuffix = currentSheetName ? "_" + currentSheetName : "";
  link.download = `${baseName}${sheetSuffix}_进度文档_${date}.json`;
  const url = URL.createObjectURL(blob);
  link.href = url;

}

function importProgress() {
  if (!headers.length) return alert("请先加载词表");
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) return alert("进度文档异常大，已拒绝导入");
    const reader = new FileReader();
    reader.onload = event => {
      try {
        const obj = JSON.parse(event.target.result);
        if (!obj || typeof obj !== "object" || !Array.isArray(obj.eliminatedWords) || (obj.questionedWords != null && !Array.isArray(obj.questionedWords))) throw new Error("格式错误");
        const legacyHash = legacyQuickHash([currentSheetName, ...origData]);
        if (obj.hash !== fileHash && obj.hash !== legacyHash) return alert("进度文档与当前词表不匹配！");
        if (obj.sheetName && obj.sheetName !== currentSheetName) return alert("进度文档属于另一个工作表！");
        eliminatedWords = normalizeImportedStatus(obj.eliminatedWords);
        questionedWords = normalizeImportedStatus(obj.questionedWords || []);
        questionedWords.forEach(id => eliminatedWords.delete(id));
        if (Array.isArray(obj.columnWidths) && obj.columnWidths.length === headers.length) {
          columnWidths = obj.columnWidths.map((value, index) => { const fixed = getColumnFixedWidth(index); return fixed != null ? fixed : Math.max(isPHeaderColumn(index) ? P_COLUMN_MIN_WIDTH : MANUAL_NARROW_COLUMN_WIDTH, Number(value) || getColumnMinWidth(index)); });
        }
        if (Array.isArray(obj.visibleColumns) && obj.visibleColumns.length === headers.length) {
          visibleColumns = obj.visibleColumns.map(value => value !== false);
        }
        pageSize = [50, 100, 200, 300].includes(Number(obj.pageSize)) ? Number(obj.pageSize) : pageSize;
        firstColHugeMode = obj.firstColHugeMode === true;
        studyFocusMode = typeof obj.studyFocusMode === "string" ? obj.studyFocusMode : "all";
        coverMode = ["word", "phonetic", "meaning"].includes(obj.coverMode) ? obj.coverMode : "none";
        stickyColumnCount = [1, 2, 3, 4, 5].includes(Number(obj.stickyColumnCount)) ? Number(obj.stickyColumnCount) : 3;
        undoStack = [];
        document.getElementById("pageSizeSelect").value = String(pageSize);
        applyCoverModeUI();
        updateUndoButton();
        ensureSelectedColumn();
        saveProgress(true);
        renderAll();
        document.getElementById("fileNotice").textContent = `已导入 ${eliminatedWords.size + questionedWords.size} 条进度（叉叉 ${eliminatedWords.size}，问号 ${questionedWords.size}）`;
      } catch (error) {
        alert("进度文档格式错误或内容损坏！");
      }
    };
    reader.readAsText(file, "utf-8");
  };
  input.click();
}

function activateSheet(sheetName) {
  const matched = workbookSheets.find(item => item.name === sheetName);
  if (!matched || isWorkerBusy || currentSheetName === sheetName && headers.length) return;
  setLoadingState(true, `正在切换工作表：${sheetName}`, matched.rows ? "正在载入当前工作表数据" : "首次打开该表，正在后台读取");
  if (workerWorkbookReady) {
    // 页面侧始终只保留当前工作表，返回旧表时再从后台工作簿按需读取。
    workbookSheets.forEach(item => { if (item !== matched) item.rows = null; });
  }
  const loadRows = matched.rows
    ? Promise.resolve(matched.rows)
    : workerWorkbookReady
      ? requestWorkbookSheet(sheetName).then(sheet => {
          matched.rows = sheet.rows || [];
          return matched.rows;
        })
      : Promise.resolve([]);
  loadRows.then(rows => {
    const prepared = prepareRows(rows);
    applySheetPayload(matched.name, prepared.headers, prepared.rows, false);
  }).catch(error => {
    setLoadingState(false, "");
    alert(error && error.message ? error.message : "切换工作表失败");
  });
}

function populateSheetSelect() {
  const wrap = document.getElementById("sheetWrap");

  if (workbookSheets.length <= 1) {

  wrap.style.display = "flex";
  select.innerHTML = workbookSheets.map(sheet => `<option value="${escapeHtml(sheet.name)}">${escapeHtml(sheet.name)}</option>`).join("");
  select.value = currentSheetName || workbookSheets[0].name;
}

document.getElementById("fileInput").addEventListener("change", event => {
  const file = event.target.files[0];
  if (!file) return;
  if (!/\.(xlsx?|csv)$/i.test(file.name)) return alert("仅支持 XLSX、XLS 和 CSV 文件");
  if (typeof XLSX === "undefined") return alert("Excel 解析组件加载失败，请检查网络后刷新页面");
  fileName = file.name;
  setLoadingState(true, `正在读取文件：${file.name}`, "文件读取完成后会自动进入后台解析");
  const reader = new FileReader();
  reader.onerror = () => { setLoadingState(false, ""); alert("读取文件失败，请重新选择文件"); };
  if (/\.xlsx?$/i.test(file.name)) {
    reader.onload = e => loadWorkbook(file, e.target.result);
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = e => {
      const buffer = e.target.result;
      let text;
      try { text = new TextDecoder("utf-8", { fatal: true }).decode(buffer); }
      catch {
        try { text = new TextDecoder("gb18030").decode(buffer); }
        catch { text = new TextDecoder("utf-8").decode(buffer); }
      }
      loadCsv(file, text.replace(/^\uFEFF/, ""));
    };
    reader.readAsArrayBuffer(file);
  }
});

function applySorting() {
  data = origData.slice();
  const preset = document.getElementById("sortSelect").value;
  const wordIdx = getWordColumnIndex();
  if (headerSort.index >= 0 && headerSort.direction) {
    const targetIndex = headerSort.index;
    const direction = headerSort.direction === "asc" ? 1 : -1;
    data.sort((a, b) => {
      const compared = compareValues(a[targetIndex], b[targetIndex]);
      if (compared !== 0) return compared * direction;
      return compareValues(a[wordIdx], b[wordIdx]);
    });
    return;
  }
  if (preset === "origin") return;
  if (preset === "alpha-asc") {
    data.sort((a, b) => compareValues(a[wordIdx], b[wordIdx]));
  } else if (preset === "alpha-desc") {
    data.sort((a, b) => compareValues(b[wordIdx], a[wordIdx]));
  } else if (preset === "tail-asc") {
    data.sort((a, b) => compareValues(normalizeCell(a[wordIdx]).slice(-1), normalizeCell(b[wordIdx]).slice(-1)) || compareValues(a[wordIdx], b[wordIdx]));
  } else if (preset === "tail-desc") {
    data.sort((a, b) => compareValues(normalizeCell(b[wordIdx]).slice(-1), normalizeCell(a[wordIdx]).slice(-1)) || compareValues(a[wordIdx], b[wordIdx]));
  } else if (preset === "len-asc") {
    data.sort((a, b) => normalizeCell(a[wordIdx]).length - normalizeCell(b[wordIdx]).length || compareValues(a[wordIdx], b[wordIdx]));
  } else if (preset === "len-desc") {
    data.sort((a, b) => normalizeCell(b[wordIdx]).length - normalizeCell(a[wordIdx]).length || compareValues(a[wordIdx], b[wordIdx]));
  }
}

function passesSearch(row) {
  if (!globalSearchText) return true;
  const reg = buildWildcardRegExp(globalSearchText);
  if (!reg) return true;
  return reg.test(normalizeCell(row[getWordColumnIndex()]));
}

function passesColumnFilters(row, ignoreColumn = -1) {
  for (let idx = 0; idx < headers.length; idx++) {
    if (idx === ignoreColumn) continue;
    const textFilter = normalizeCell(columnTextFilters[idx]);
    const exactFilter = columnExactFilters[idx] || FILTER_ALL;
    const cell = normalizeCell(row[idx]);
    if (textFilter && !matchesWildcardList(cell, textFilter)) return false;
    if (exactFilter === FILTER_BLANK && cell !== "") return false;
    if (exactFilter === FILTER_NONBLANK && cell === "") return false;
    if (isPresetGroupFilterValue(exactFilter)) {
      const groupPattern = decodePresetGroupFilter(exactFilter);
      if (!matchesWildcardList(cell, groupPattern)) return false;
      continue;
    }
    if (exactFilter !== FILTER_ALL && exactFilter !== FILTER_BLANK && exactFilter !== FILTER_NONBLANK && cell !== exactFilter) return false;
  }
  return true;
}

function passesHideEliminated(row) {
  if (!hideEliminated) return true;
  return !eliminatedWords.has(getWordKey(row));
}

function getVisibleIndices(ignoreColumn = -1) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    const row = data[i];
    if (!passesSearch(row)) continue;
    if (!passesHideEliminated(row)) continue;
    if (!passesColumnFilters(row, ignoreColumn)) continue;
    result.push(i);
  }
  return result;
}

function clampCurrentPage() {
  const totalPages = Math.max(1, Math.ceil(getVisibleIndices().length / pageSize));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
}

function getExactOptions(columnIndex, stateKey) {
  syncFilterOptionCache(stateKey);
  const cacheKey = getFilterCacheKey(columnIndex, stateKey);
  if (filterOptionCache.has(cacheKey)) {
    const cachedItems = filterOptionCache.get(cacheKey).map(item => ({ ...item }));
    const current = columnExactFilters[columnIndex] || FILTER_ALL;
    if (![FILTER_ALL, FILTER_BLANK, FILTER_NONBLANK].includes(current) && !isPresetGroupFilterValue(current) && current && !cachedItems.some(item => item.value === current)) {
      cachedItems.unshift({ value: current, count: 0 });
    }
    return cachedItems;
  }
  const countMap = new Map();
  const indices = getVisibleIndices(columnIndex);
  for (const rowIndex of indices) {
    const value = normalizeCell(data[rowIndex][columnIndex]);
    countMap.set(value, (countMap.get(value) || 0) + 1);
  }
  const items = Array.from(countMap.entries())
    .map(([value, count]) => ({ value, count }))
    .sort((a, b) => compareValues(a.value, b.value));
  filterOptionCache.set(cacheKey, items.map(item => ({ ...item })));
  const current = columnExactFilters[columnIndex] || FILTER_ALL;
  if (![FILTER_ALL, FILTER_BLANK, FILTER_NONBLANK].includes(current) && !isPresetGroupFilterValue(current) && current && !countMap.has(current)) {
    items.unshift({ value: current, count: 0 });
  }
  return items;
}

function buildExactOptionsHtml(columnIndex, stateKey) {
  syncFilterOptionCache(stateKey);
  const current = columnExactFilters[columnIndex] || FILTER_ALL;
  const cacheKey = getFilterCacheKey(columnIndex, stateKey);
  const loaded = loadedFilterOptionKeys.has(cacheKey) && filterOptionCache.has(cacheKey);
  const baseIndices = loaded ? getVisibleIndices(columnIndex) : [];
  const totalCount = baseIndices.length;
  let blankCount = 0;
  let nonBlankCount = 0;
  for (const rowIndex of baseIndices) {
    const value = normalizeCell(data[rowIndex][columnIndex]);
    if (value === "") blankCount++;
    else nonBlankCount++;
  }
  const options = [
    { value: FILTER_ALL, label: loaded ? `全部 (${totalCount})` : "全部", disabled: false },
    { value: FILTER_NONBLANK, label: loaded ? `非空 (${nonBlankCount})` : "非空", disabled: false },
    { value: FILTER_BLANK, label: loaded ? `空白 (${blankCount})` : "空白", disabled: false }
  ];
  const presetGroups = getPresetGroupFilters(columnIndex);
  if (presetGroups.length) {
    presetGroups.forEach(patternText => {
      options.push({
        value: encodePresetGroupFilter(patternText),
        label: `预设：${patternText}`,
        disabled: false
      });
    });
  }
  if (loaded) {
    filterOptionCache.get(cacheKey).forEach(item => {
      const baseLabel = item.value || "(空白)";
      options.push({ value: item.value, label: `${baseLabel} (${item.count})`, disabled: false });
    });
  } else {
    if (![FILTER_ALL, FILTER_BLANK, FILTER_NONBLANK].includes(current) && !isPresetGroupFilterValue(current) && current) {
      options.push({ value: current, label: `${current || "(空白)"} (0)`, disabled: false });
    }
    options.push({ value: "__LAZY__", label: "点此加载候选", disabled: true });
  }
  return options.map(item => `<option value="${escapeHtml(item.value)}" ${item.value === current ? "selected" : ""} ${item.disabled ? "disabled" : ""}>${escapeHtml(item.label)}</option>`).join("");
}

function ensureExactOptionsLoaded(columnIndex) {
  if (!headers.length) return;
  const stateKey = getFilterOptionStateKey();
  syncFilterOptionCache(stateKey);
  const cacheKey = getFilterCacheKey(columnIndex, stateKey);
  if (loadedFilterOptionKeys.has(cacheKey) || loadingFilterOptionKeys.has(cacheKey)) return;
  loadingFilterOptionKeys.add(cacheKey);
  setLoadingState(true, `正在构建筛选候选：${headers[columnIndex]}`, "仅首次展开该列时计算一次，请稍候");
  setTimeout(() => {
    getExactOptions(columnIndex, stateKey);
    loadedFilterOptionKeys.add(cacheKey);
    loadingFilterOptionKeys.delete(cacheKey);
    const select = document.getElementById(`header-filter-select-${columnIndex}`);
    if (select) {
      select.innerHTML = buildExactOptionsHtml(columnIndex, stateKey);
      select.value = columnExactFilters[columnIndex] || FILTER_ALL;
    }
    setLoadingState(false);
  }, 0);
}

function getFilterStatus(index) {
  const parts = [];
  const textFilter = normalizeCell(columnTextFilters[index]);
  const exactFilter = columnExactFilters[index] || FILTER_ALL;
  if (textFilter) parts.push(`含“${textFilter}”`);
  if (exactFilter === FILTER_BLANK) parts.push("空白");
  else if (exactFilter === FILTER_NONBLANK) parts.push("非空");
  else if (isPresetGroupFilterValue(exactFilter)) parts.push(`预设“${decodePresetGroupFilter(exactFilter)}”`);
  else if (exactFilter !== FILTER_ALL) parts.push(`等于“${exactFilter}”`);
  return parts.join("，");
}

  const filterHtml = visibleColumnIndices.map(idx => {

    const selectedClass = selectedColumnIndex === idx ? " selected" : "";
    const narrowClass = columnWidths[idx] <= MANUAL_NARROW_COLUMN_WIDTH && getColumnFixedWidth(idx) == null ? " manual-narrow-filter" : "";
    const fixedNarrowClass = columnWidths[idx] <= UNIFORM_STUDY_COLUMN_WIDTH ? " uniform-narrow-col" : "";
    const studyClass = isWordColumn
      ? ` study-col-1 first-col-filter${firstColHugeMode ? " first-col-filter-huge" : ""}`
      : isPhoneticColumn
        ? ` study-col-2 second-col-filter${firstColHugeMode ? " second-col-filter-huge" : ""}`
        : "";
    const stickyStyle = sticky ? ` style="left:${sticky.left}px;"` : "";
    return `
      <th data-column-index="${idx}" class="resizable-filter-th${idx === 1 ? " col2-fixed-filter" : ""}${idx >= 13 ? " uniform-study-filter" : ""}${idx >= 5 && idx <= 12 ? " uniform-study-filter" : ""}${idx === 6 ? " col-7-purple" : ""}${idx === 7 ? " col-8-light-orange" : ""}${idx === 8 ? " col-9-light-purple" : ""}${selectedClass}${studyClass}${narrowClass}${fixedNarrowClass} ${stickyClass}"${stickyStyle}>
        <div class="header-filter-box">
          <input class="header-filter-text" value="${escapeHtml(columnTextFilters[idx] || "")}" placeholder="支持空格或关系 + * ?" oninput="setColumnTextFilter(${idx}, this.value)">
          <select id="header-filter-select-${idx}" class="header-filter-select" onfocus="ensureExactOptionsLoaded(${idx})" onpointerdown="ensureExactOptionsLoaded(${idx})" onchange="setColumnExactFilter(${idx}, this.value)" ${selectValue === "__LAZY__" ? "" : ""}>${optionsHtml}</select>
          <div class="filter-status">${escapeHtml(status || "")}</div>
        </div>
      </th>
    `;
  }).join("");
  const rowsHtml = visibleIndices.slice(start, end).map(rowIndex => {
    const row = data[rowIndex];
    const wordKey = getWordKey(row);
    const eliminatedRow = eliminatedWords.has(wordKey);
    const questionedRow = questionedWords.has(wordKey);
    const rowClass = eliminatedRow ? "eliminated" : questionedRow ? "questioned" : "";
    return `
      <tr class="${rowClass}" data-word-key="${escapeHtml(wordKey)}">
        ${visibleColumnIndices.map(idx => {
          const isWordColumn = idx === getWordColumnIndex();
          const isPhoneticColumn = idx === getPhoneticColumnIndex();
          const sticky = stickyConfig.get(idx);
          const stickyClass = sticky ? `sticky-col${sticky.last ? " sticky-divider" : ""}` : "";
          const narrowClass = columnWidths[idx] <= MANUAL_NARROW_COLUMN_WIDTH && getColumnFixedWidth(idx) == null ? " manual-narrow-td" : "";
          const fixedNarrowClass = columnWidths[idx] <= UNIFORM_STUDY_COLUMN_WIDTH ? " uniform-narrow-col" : "";
          const studyClass = isWordColumn
            ? ` study-col-1 first-col-emphasis${firstColHugeMode ? " first-col-huge" : ""}`
            : isPhoneticColumn
              ? ` study-col-2 second-col-emphasis${firstColHugeMode ? " second-col-huge" : ""}`
              : "";
          const stateBackground = eliminatedRow ? "background:#ffb46a;" : questionedRow ? "background:#ffd9d4;" : "";
          const stickyStyle = sticky ? ` style="left:${sticky.left}px;${stateBackground}"` : "";
          const roleClass = isWordColumn ? "word-role " : isPhoneticColumn ? "phonetic-role " : idx === getMeaningColumnIndex() ? "meaning-role " : "";
          return `<td data-column-index="${idx}" class="${roleClass}${idx >= 5 ? "uniform-study-td " : ""}${idx === 6 ? "col-7-purple " : ""}${idx === 7 ? "col-8-light-orange " : ""}${idx === 8 ? "col-9-light-purple " : ""}${stickyClass}${studyClass}${narrowClass}${fixedNarrowClass}"${stickyStyle}><span class="cell-text">${escapeHtml(row[idx])}</span></td>`;
        }).join("")}
        <td class="action-cell" data-action-row="${escapeHtml(wordKey)}">
          <div class="action-buttons">
            <button type="button" class="status-btn eliminate-status-btn${eliminatedRow ? " active" : ""}" data-status="eliminated" aria-label="${eliminatedRow ? '取消叉叉标记' : '标记为叉叉'}">✕</button>
            <button type="button" class="status-btn question-status-btn${questionedRow ? " active" : ""}" data-status="questioned" aria-label="${questionedRow ? '取消问号标记' : '标记为问号'}">?</button>
          </div>
        </td>
      </tr>
    `;
  }).join("");
  const emptyHtml = visibleIndices.length
    ? rowsHtml
    : `<tr><td class="empty-row" colspan="${visibleColumnIndices.length + 1}">当前筛选结果为空</td></tr>`;
  table.innerHTML = `
    ${colGroupHtml}
    <thead>
      <tr class="header-row">${headerHtml}<th class="action-header-cell"><div class="th-inner"><span class="th-label">✕ / ?</span></div></th></tr>
      <tr class="filter-row">${filterHtml}<th></th></tr>
    </thead>
    <tbody>${emptyHtml}</tbody>
  `;
  syncStickyOffsetsFromLayout();
  renderColumnPanel();
  updateColumnToolBar();
  updateStatBar();
}

function renderPagination() {
  const indices = getVisibleIndices();
  const totalPages = Math.max(1, Math.ceil(indices.length / pageSize));
  clampCurrentPage();
  let html = "";
  if (currentPage > 1) html += `<button onclick="gotoPage(${currentPage - 1})">&lt;上一页</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === currentPage) {
      html += `<b>${i}</b> `;
    } else if (i <= 3 || i > totalPages - 3 || Math.abs(i - currentPage) <= 1) {
      html += `<button onclick="gotoPage(${i})">${i}</button>`;
    } else if (i === currentPage - 2 || i === currentPage + 2) {
      html += "...";
    }
  }
  if (currentPage < totalPages) html += `<button onclick="gotoPage(${currentPage + 1})">下一页&gt;</button>`;
  document.getElementById("pagination").innerHTML = html;
  saveProgress();
}

function renderAll() {
  renderTable();
  renderPagination();
  updateStatBar();
  setTimeout(updateSlider, 10);
}

function gotoPage(page) {
  currentPage = page;
  renderAll();
}

function updateUndoButton() {
  const button = document.getElementById("undoBtn");
  if (!button) return;
  button.disabled = undoStack.length === 0;
  button.textContent = undoStack.length ? `撤销上一步 (${undoStack.length})` : "撤销上一步";
}

function getRowStatus(id) {
  if (eliminatedWords.has(id)) return "eliminated";
  if (questionedWords.has(id)) return "questioned";
  return "unprocessed";
}

function setRowStatus(id, status) {
  eliminatedWords.delete(id);
  questionedWords.delete(id);
  if (status === "eliminated") eliminatedWords.add(id);
  if (status === "questioned") questionedWords.add(id);
}

function pushUndo(changes) {
  if (!changes.length) return;
  undoStack.push(changes);
  if (undoStack.length > 30) undoStack.shift();
  updateUndoButton();
}

function undoLastAction() {
  const changes = undoStack.pop();
  if (!changes) return;
  changes.forEach(change => setRowStatus(change.id, change.previousStatus));
  updateUndoButton();
  saveProgress();
  renderAll();
}

function toggleRowStatus(rowId, nextStatus, event) {
  if (event) event.stopPropagation();
  const previousStatus = getRowStatus(rowId);
  pushUndo([{ id: rowId, previousStatus }]);
  setRowStatus(rowId, previousStatus === nextStatus ? "unprocessed" : nextStatus);
  currentPage = Math.max(currentPage, 1);
  saveProgress();
  renderAll();
}

function getFilteredRowIds() {
  const ids = [];
  data.forEach(row => {
    if (passesSearch(row) && passesColumnFilters(row)) ids.push(getWordKey(row));
  });
  return ids;
}

function batchSetVisible(eliminated) {
  if (!headers.length) return;
  const targetStatus = eliminated ? "eliminated" : "unprocessed";
  const ids = getFilteredRowIds();
  const changes = ids.filter(id => getRowStatus(id) !== targetStatus).map(id => ({ id, previousStatus: getRowStatus(id) }));
  if (!changes.length) return alert(eliminated ? "当前筛选结果已全部标记叉叉" : "当前筛选结果已全部恢复为未处理");
  const actionText = eliminated ? "标记叉叉" : "恢复为未处理";
  if (!confirm(`确定要将当前筛选的 ${changes.length} 条记录全部${actionText}吗？`)) return;
  pushUndo(changes);
  changes.forEach(change => setRowStatus(change.id, targetStatus));
  currentPage = 1;
  saveProgress();
  renderAll();
}

function applyCoverModeUI() {
  document.body.classList.toggle("cover-word", coverMode === "word");
  document.body.classList.toggle("cover-phonetic", coverMode === "phonetic");
  document.body.classList.toggle("cover-meaning", coverMode === "meaning");
  const wordBtn = document.getElementById("coverWordBtn");
  const phoneticBtn = document.getElementById("coverPhoneticBtn");
  const meaningBtn = document.getElementById("coverMeaningBtn");
  if (wordBtn) wordBtn.classList.toggle("active", coverMode === "word");
  if (phoneticBtn) phoneticBtn.classList.toggle("active", coverMode === "phonetic");
  if (meaningBtn) meaningBtn.classList.toggle("active", coverMode === "meaning");
  if (wordBtn) wordBtn.textContent = coverMode === "word" ? "显示全部单词" : "遮住单词";
  if (phoneticBtn) phoneticBtn.textContent = coverMode === "phonetic" ? "显示全部音标" : "遮住音标";
  if (meaningBtn) meaningBtn.textContent = coverMode === "meaning" ? "显示全部释义" : "遮住释义";
}

function toggleCoverMode(mode) {
  coverMode = coverMode === mode ? "none" : mode;
  applyCoverModeUI();
  saveProgress();
  renderTable();
}

function setPageSize(value) {
  const next = Number(value);
  pageSize = [50, 100, 200, 300].includes(next) ? next : 100;
  currentPage = 1;
  saveProgress();
  renderAll();
}

function toggleHideEliminated() {
  hideEliminated = !hideEliminated;
  document.getElementById("toggleHideBtn").textContent = hideEliminated ? "显示已消灭单词" : "隐藏已消灭单词";
  currentPage = 1;
  renderAll();
}

function setHeaderSort(index, direction) {
  if (headerSort.index === index && headerSort.direction === direction) {
    headerSort = { index: -1, direction: "" };
  } else {
    headerSort = { index, direction };
  }
  document.getElementById("sortSelect").value = "origin";
  currentPage = 1;
  applySorting();
  renderAll();
}

function clearHeaderSort() {
  if (headerSort.index < 0) return;
  headerSort = { index: -1, direction: "" };
  applySorting();
  renderAll();
}

function setColumnTextFilter(index, value) {
  columnTextFilters[index] = value;
  currentPage = 1;
  clearTimeout(filterInputTimer);
  filterInputTimer = setTimeout(() => renderAll(), 220);
}

function setColumnExactFilter(index, value) {
  columnExactFilters[index] = value || FILTER_ALL;
  currentPage = 1;
  renderAll();
}

function clearHeaderFilters() {
  columnTextFilters = Array.from({ length: headers.length }, () => "");
  columnExactFilters = Array.from({ length: headers.length }, () => FILTER_ALL);
  currentPage = 1;
  renderAll();
}

function doSearch() {
  globalSearchText = normalizeCell(document.getElementById("searchBox").value);
  currentPage = 1;
  renderAll();
}

function clearSearch() {
  globalSearchText = "";
  document.getElementById("searchBox").value = "";
  currentPage = 1;
  renderAll();
}

function escapeCSV(value) {
  let text = String(value ?? "");
  if (text.includes('"')) text = text.replace(/"/g, '""');
  if (/[",\n]/.test(text)) return `"${text}"`;
  return text;
}

function exportCSV(type) {
  if (!headers.length) return;
  const statusLabel = id => getRowStatus(id) === "eliminated" ? "叉叉" : getRowStatus(id) === "questioned" ? "问号" : "未处理";
  const rows = [[...headers, "处理状态"].map(escapeCSV).join(",")];
  origData.forEach(row => {
    const id = getWordKey(row);
    const status = getRowStatus(id);
    if (type === "unprocessed" && status !== "unprocessed") return;
    if (type === "questioned" && status !== "questioned") return;
    rows.push([...row, statusLabel(id)].map(escapeCSV).join(","));
  });
  const blob = new Blob(["\uFEFF", rows.join("\r\n")], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);
  link.href = url;
  const fileLabel = type === "all" ? "总进度" : type === "unprocessed" ? "未知单词" : "问号单词";
  link.download = `${fileLabel}${currentSheetName ? "_" + currentSheetName : ""}.csv`;
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function backToPageTop() {
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function clearOldSettings() {
  if (!headers.length || !fileName) return alert("请先导入 Excel 文件");
  if (!confirm("确定清空这个 Excel 所有工作表的旧界面设置吗？叉叉、问号等学习进度会保留。")) return;
  const keyPrefix = `${STORAGE_PREFIX}${fileName}_`;
  const settingFields = [
    "currentPage", "pageSize", "columnWidths", "visibleColumns",
    "firstColHugeMode", "studyFocusMode", "coverMode", "stickyColumnCount"
  ];
  let cleanedCount = 0;
  try {
    for (let index = 0; index < localStorage.length; index++) {
      const key = localStorage.key(index);
      if (!key || !key.startsWith(keyPrefix)) continue;
      let saved;
      try { saved = JSON.parse(localStorage.getItem(key) || "null"); } catch { saved = null; }
      if (!saved || typeof saved !== "object") continue;
      settingFields.forEach(field => delete saved[field]);
      saved.updatedAt = new Date().toISOString();
      localStorage.setItem(key, JSON.stringify(saved));
      cleanedCount++;
    }
  } catch (error) {
    return alert(`清空旧设置失败：${error && error.message ? error.message : "浏览器存储不可用"}`);
  }

  hideEliminated = false;
  globalSearchText = "";
  currentPage = 1;
  pageSize = 100;
  selectedColumnIndex = -1;
  firstColHugeMode = false;
  studyFocusMode = "all";
  preFocusVisibleColumns = null;
  columnPanelVisible = false;
  coverMode = "none";
  stickyColumnCount = 3;
  clearFilterState();
  clearFilterOptionCache();
  columnWidths = [];
  visibleColumns = [];
  syncColumnWidths(true);
  syncVisibleColumns(true);
  ensureSelectedColumn();
  document.getElementById("toggleHideBtn").textContent = "隐藏已消灭单词";
  document.getElementById("searchBox").value = "";
  document.getElementById("sortSelect").value = "origin";
  document.getElementById("pageSizeSelect").value = "100";
  applyCoverModeUI();
  saveProgress(true);
  renderAll();
  document.getElementById("fileNotice").textContent = `已清空 ${Math.max(cleanedCount, 1)} 个工作表的旧设置，学习进度已保留`;
}

function resetView() {
  if (!headers.length) return;
  hideEliminated = false;
  globalSearchText = "";
  currentPage = 1;
  selectedColumnIndex = -1;
  firstColHugeMode = false;
  studyFocusMode = "all";
  preFocusVisibleColumns = null;
  columnPanelVisible = false;
  coverMode = "none";
  stickyColumnCount = 3;
  clearFilterState();
  clearFilterOptionCache();
  syncColumnWidths(true);
  syncVisibleColumns(true);
  ensureSelectedColumn();
  document.getElementById("toggleHideBtn").textContent = "隐藏已消灭单词";
  document.getElementById("searchBox").value = "";
  document.getElementById("sortSelect").value = "origin";
  applyCoverModeUI();
  saveProgress();
  renderAll();
}

function clearLearningProgress() {
  const progressCount = eliminatedWords.size + questionedWords.size;
  if (!headers.length || !progressCount) return alert("当前没有需要清空的学习进度");
  if (!confirm(`确定清空当前工作表的 ${progressCount} 条学习进度吗？此操作不可撤销。`)) return;
  eliminatedWords.clear();
  questionedWords.clear();
  undoStack = [];
  updateUndoButton();
  safeStorageRemove(getStorageKey());
  currentPage = 1;
  renderAll();
  document.getElementById("fileNotice").textContent = "学习进度已清空";
}

document.getElementById("sortSelect").addEventListener("change", function() {
  if (!headers.length) return;
  headerSort = { index: -1, direction: "" };
  currentPage = 1;
  applySorting();
  renderAll();
});

function updateSlider() {
  const indices = getVisibleIndices();
  const totalPages = Math.ceil(indices.length / pageSize);
  const slider = document.getElementById("pageSlider");
  const wrap = document.getElementById("pageSliderWrap");
  if (totalPages <= 1) {
    wrap.style.display = "none";
    slider.innerHTML = "";
    return;
  }
  wrap.style.display = "";
  const height = wrap.clientHeight;
  const thumbHeight = Math.max(28, height / totalPages);
  const maxTop = Math.max(height - thumbHeight, 0);
  const top = totalPages === 1 ? 0 : maxTop / (totalPages - 1) * (currentPage - 1);
  slider.innerHTML = `<div class="slider-thumb" id="sliderThumb" style="top:${top}px;height:${thumbHeight}px;">${currentPage}</div>`;
  const thumb = document.getElementById("sliderThumb");
  thumb.onpointerdown = event => {
    activeSliderDrag = {
      startY: event.clientY,
      startPage: currentPage,
      totalPages,
      thumbHeight
    };
    document.body.style.userSelect = "none";
    window.addEventListener("pointermove", handlePointerMove, { passive: true });
    window.addEventListener("pointerup", handlePointerUp, { passive: true });
    window.addEventListener("pointercancel", handlePointerUp, { passive: true });
  };
}

document.getElementById("wordTable").addEventListener("click", event => {
  const statusButton = event.target.closest(".status-btn");
  const actionCell = event.target.closest(".action-cell");
  if (statusButton && actionCell && actionCell.dataset.actionRow) {
    toggleRowStatus(actionCell.dataset.actionRow, statusButton.dataset.status, event);
    return;
  }
  const coverCell = event.target.closest("td.word-role, td.phonetic-role, td.meaning-role");
  if (!coverCell) return;
  const canReveal = (coverMode === "word" && coverCell.classList.contains("word-role")) ||
    (coverMode === "phonetic" && coverCell.classList.contains("phonetic-role")) ||
    (coverMode === "meaning" && coverCell.classList.contains("meaning-role"));
  if (canReveal) coverCell.classList.toggle("revealed");
});
window.addEventListener("beforeunload", () => saveProgress(true));
document.addEventListener("pointerdown", maybeCloseColumnPanel, { passive: true });
window.onresize = () => setTimeout(() => {
  updateSlider();
  syncStickyOffsetsFromLayout();
}, 200);
</script>
